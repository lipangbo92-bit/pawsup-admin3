<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Banner管理 - PawsUp 爪哇宠屋</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .preview-img { 
            max-height: 120px; 
            object-fit: cover; 
            border-radius: 8px; 
        }
        .banner-table {
            width: 100%;
            border-collapse: collapse;
        }
        .banner-table th,
        .banner-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        .banner-table th {
            background: #f9fafb;
            font-weight: 600;
            color: #374151;
        }
        .banner-table tr:hover {
            background: #f9fafb;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-active {
            background: #d1fae5;
            color: #065f46;
        }
        .status-inactive {
            background: #f3f4f6;
            color: #6b7280;
        }
        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            margin-right: 8px;
        }
        .btn-edit {
            background: #3b82f6;
            color: white;
        }
        .btn-edit:hover {
            background: #2563eb;
        }
        .btn-delete {
            background: #ef4444;
            color: white;
        }
        .btn-delete:hover {
            background: #dc2626;
        }
        .btn-primary {
            background: #f97316;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-primary:hover {
            background: #ea580c;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #6b7280;
        }
        .modal-body {
            padding: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #374151;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }
        .image-upload {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
        }
        .image-upload:hover {
            border-color: #f97316;
        }
        .modal-footer {
            padding: 20px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn-cancel {
            background: #f3f4f6;
            color: #374151;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-left">
                <span class="logo-icon">🐾</span>
                <h1>PawsUp 爪哇宠屋</h1>
            </div>
            <div class="header-right">
                <span class="admin-badge">管理员</span>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </header>
        
        <div class="dashboard-layout">
            <nav class="sidebar">
                <ul class="nav-menu">
                    <li><a href="dashboard">📊 仪表盘</a></li>
                    <li><a href="admin-appointments">📋 预约管理</a></li>
                    <li><a href="orders">📦 订单管理</a></li>
                    <li><a href="services">🛁 服务管理</a></li>
                    <li><a href="boarding-rooms">🏠 房型管理</a></li>
                    <li><a href="groomers">👨‍🔧 美容师管理</a></li>
                    <li><a href="admin-schedule">📅 排班管理</a></li>
                    <li class="active"><a href="banner">🖼️ Banner管理</a></li>
                    <li><a href="membership-levels">💎 会员档位</a></li>
                    <li><a href="coupons">🎫 优惠券</a></li>
                    <li><a href="users">👥 用户管理</a></li>
                    <li><a href="statistics">📈 数据统计</a></li>
                </ul>
            </nav>
            
            <main class="main-content">
                <div class="page-header">
                    <h2>Banner管理</h2>
                    <button class="btn-primary" onclick="openModal()">+ 新增Banner</button>
                </div>
                
                <div class="dashboard-card">
                    <table class="banner-table">
                        <thead>
                            <tr>
                                <th>排序</th>
                                <th>图片</th>
                                <th>标题</th>
                                <th>副标题</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="bannerList">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- 新增/编辑弹窗 -->
    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle">新增Banner</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Banner图片</label>
                    <div class="image-upload" onclick="document.getElementById('bannerImage').click()">
                        <input type="file" id="bannerImage" accept="image/*" style="display:none" onchange="previewImage(event)">
                        <div id="uploadPlaceholder">
                            <p>点击上传图片</p>
                            <p style="font-size:12px;color:#9ca3af">建议尺寸 750×300px</p>
                        </div>
                        <img id="previewImg" class="preview-img hidden">
                    </div>
                </div>
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="bannerTitle" placeholder="例如：专业宠物美容">
                </div>
                <div class="form-group">
                    <label>副标题</label>
                    <input type="text" id="bannerSubtitle" placeholder="例如：让您的爱宠焕然一新">
                </div>
                <div class="form-group">
                    <label>排序</label>
                    <input type="number" id="bannerSort" value="0" placeholder="数字越小越靠前">
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="bannerStatus">
                        <option value="active">显示</option>
                        <option value="inactive">隐藏</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-primary" onclick="saveBanner()">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal-overlay" id="deleteConfirmModal">
        <div class="modal-box" style="max-width: 400px;">
            <div class="modal-header">
                <h3>确认删除</h3>
                <button class="modal-close" onclick="closeDeleteConfirm()">&times;</button>
            </div>
            <div class="modal-body" style="text-align: center; padding: 30px 20px;">
                <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
                <p style="color: #374151; font-size: 16px; margin-bottom: 8px;">确定要删除这个Banner吗？</p>
                <p style="color: #6b7280; font-size: 14px;">删除后无法恢复</p>
            </div>
            <div class="modal-footer" style="justify-content: center;">
                <button class="btn-cancel" onclick="closeDeleteConfirm()">取消</button>
                <button class="action-btn btn-delete" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>

    <script src="https://res.wx.qq.com/open/js/cloudbase/1.1.0/cloud.js"></script>
    <script src="js/app.js"></script>
    <script src="js/banner.js"></script>
</body>
</html>
