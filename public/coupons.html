<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优惠券管理 - PawsUp管理后台</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .coupons-container {
            padding: 24px;
        }
        
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #F97316 0%, #EA580C 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
        }
        
        .filter-tabs {
            display: flex;
            gap: 12px;
        }
        
        .filter-tab {
            padding: 8px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .filter-tab.active {
            background: #F97316;
            color: white;
            border-color: #F97316;
        }
        
        .coupons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }
        
        .coupon-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .coupon-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        
        .coupon-header {
            background: linear-gradient(135deg, #F97316 0%, #EA580C 100%);
            color: white;
            padding: 20px;
            position: relative;
        }
        
        .coupon-header.discount {
            background: linear-gradient(135deg, #F97316 0%, #EA580C 100%);
        }
        
        .coupon-header.amount {
            background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%);
        }
        
        .coupon-header.exchange {
            background: linear-gradient(135deg, #722ed1 0%, #531dab 100%);
        }
        
        .coupon-type-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .coupon-value {
            font-size: 36px;
            font-weight: 700;
        }
        
        .coupon-value small {
            font-size: 18px;
            font-weight: 400;
        }
        
        .coupon-name {
            font-size: 18px;
            font-weight: 500;
            margin-top: 8px;
        }
        
        .coupon-code {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 4px;
        }
        
        .coupon-body {
            padding: 20px;
        }
        
        .coupon-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .coupon-info-row:last-child {
            margin-bottom: 0;
        }
        
        .info-label {
            color: #666;
        }
        
        .info-value {
            color: #333;
            font-weight: 500;
        }
        
        .progress-bar {
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: #F97316;
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .coupon-footer {
            display: flex;
            padding: 0 20px 20px;
            gap: 12px;
        }
        
        .btn-small {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #d9d9d9;
            background: white;
        }
        
        .btn-small:hover {
            border-color: #F97316;
            color: #F97316;
        }
        
        .btn-small.danger:hover {
            border-color: #ff4d4f;
            color: #ff4d4f;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .modal-body {
            padding: 24px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        .form-group label {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #F97316;
            outline: none;
        }
        
        .form-group .hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        .btn-cancel {
            padding: 10px 24px;
            border: 1px solid #d9d9d9;
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .btn-confirm {
            padding: 10px 24px;
            background: #F97316;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            z-index: 1001;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .toast.success { background: #52c41a; }
        .toast.error { background: #ff4d4f; }
        
        .loading-state {
            text-align: center;
            padding: 60px;
            color: #999;
            font-size: 14px;
        }
        
        .status-active { color: #52c41a; font-weight: 500; }
        .status-paused { color: #faad14; font-weight: 500; }
        .status-expired { color: #999; font-weight: 500; }
        .status-draft { color: #666; font-weight: 500; }
        
        .coupon-tag {
            display: inline-block;
            font-size: 12px;
            color: #F97316;
            background: #FFF2E8;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 8px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-left">
                <span class="logo-icon">🐾</span>
                <h1>PawsUp 爪哇宠屋</h1>
            </div>
            <div class="header-right">
                <span class="admin-badge">管理员</span>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </header>
        
        <div class="dashboard-layout">
            <nav class="sidebar">
                <ul class="nav-menu">
                    <li><a href="dashboard">📊 仪表盘</a></li>
                    <li><a href="admin-appointments">📋 预约管理</a></li>
                    <li><a href="orders">📦 订单管理</a></li>
                    <li><a href="services">🛁 服务管理</a></li>
                    <li><a href="boarding-rooms">🏠 房型管理</a></li>
                    <li><a href="groomers">👨‍🔧 美容师管理</a></li>
                    <li><a href="admin-schedule">📅 排班管理</a></li>
                    <li><a href="banner">🖼️ Banner管理</a></li>
                    <li><a href="membership-levels">💎 会员档位</a></li>
                    <li><a href="coupons" class="active">🎫 优惠券</a></li>
                    <li><a href="users">👥 用户管理</a></li>
                    <li><a href="statistics">📈 数据统计</a></li>
                </ul>
            </nav>
            
            <main class="main-content">
                <div class="page-header">
                    <h2>🎫 优惠券管理</h2>
                    <p class="subtitle">创建、管理和发放优惠券</p>
                </div>
                
                <div class="coupons-container">
                    <div class="action-bar">
                        <div class="filter-tabs">
                            <button class="filter-tab active" data-status="all">全部</button>
                            <button class="filter-tab" data-status="active">生效中</button>
                            <button class="filter-tab" data-status="paused">已暂停</button>
                            <button class="filter-tab" data-status="expired">已过期</button>
                        </div>
                        <button class="btn-primary" onclick="showCreateModal()">+ 新建优惠券</button>
                        <button class="btn-secondary" onclick="fixCouponStatus()" style="margin-left: 8px;">🔧 修复状态</button>
                        <button class="btn-secondary" onclick="fixUserCouponsUserId()" style="margin-left: 8px;">🔧 修复UserId</button>
                    </div>
                    
                    <div class="coupons-grid" id="couponsList">
                        <!-- 动态生成 -->
                    </div>
                    
                    <div class="empty-state" id="emptyState" style="display: none;">
                        <div class="empty-icon">🎫</div>
                        <p>暂无优惠券</p>
                        <p style="font-size: 14px; margin-top: 8px;">点击右上角按钮创建</p>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- 创建/编辑模态框 -->
    <div class="modal-overlay" id="couponModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">新建优惠券</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="couponForm">
                    <input type="hidden" id="couponId">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>优惠券名称</label>
                            <input type="text" id="couponName" placeholder="如：新用户8折券" required>
                        </div>
                        <div class="form-group">
                            <label>优惠券码</label>
                            <input type="text" id="couponCode" placeholder="如：WELCOME2026" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>优惠券类型</label>
                            <select id="couponType">
                                <option value="discount">折扣券</option>
                                <option value="amount">金额券</option>
                                <option value="exchange">兑换券</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>优惠值</label>
                            <input type="number" id="couponValue" placeholder="折扣填0.8，金额填20" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>最低消费（元）</label>
                            <input type="number" id="minOrder" placeholder="0" value="0">
                        </div>
                        <div class="form-group">
                            <label>最大优惠（元）</label>
                            <input type="number" id="maxDiscount" placeholder="不限则不填">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>发放总量</label>
                            <input type="number" id="totalCount" placeholder="-1表示不限" value="100">
                        </div>
                        <div class="form-group">
                            <label>每人限领</label>
                            <input type="number" id="limitPerUser" value="1">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>有效期类型</label>
                            <select id="validType">
                                <option value="relative">领取后生效</option>
                                <option value="fixed">固定日期</option>
                            </select>
                        </div>
                        <div class="form-group" id="validDaysGroup">
                            <label>有效天数</label>
                            <input type="number" id="validDays" value="30">
                        </div>
                    </div>
                    
                    <div class="form-row" id="fixedDateGroup" style="display: none;">
                        <div class="form-group">
                            <label>开始日期</label>
                            <input type="date" id="validFrom">
                        </div>
                        <div class="form-group">
                            <label>结束日期</label>
                            <input type="date" id="validTo">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>使用限制</label>
                            <div style="display: flex; gap: 20px; margin-top: 8px;">
                                <label style="display: flex; align-items: center; gap: 8px; font-weight: normal;">
                                    <input type="checkbox" id="newUserOnly"> 新用户专享
                                </label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm" onclick="saveCoupon()">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 发放优惠券模态框 -->
    <div class="modal-overlay" id="sendModal">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3 class="modal-title">发放优惠券</h3>
                <span class="modal-close" onclick="closeSendModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p id="sendCouponName" style="margin-bottom: 16px; font-weight: 500;"></p>
                <div class="form-group">
                    <label>用户 OpenID</label>
                    <input type="text" id="sendUserId" placeholder="请输入用户 OpenID" style="width: 100%;">
                    <p class="hint">留空则只查看发放统计</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeSendModal()">取消</button>
                <button class="btn-confirm" onclick="confirmSend()">确定</button>
            </div>
        </div>
    </div>
    
    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <script src="js/app.js"></script>
    <script src="js/coupons.js"></script>
</body>
</html>
