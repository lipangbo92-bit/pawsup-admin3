<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>PawsUp 爪哇宠屋 - 预约管理</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .date-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .date-selector label {
            font-weight: 500;
            color: var(--gray-600);
        }
        
        .summary-stats {
            display: flex;
            gap: 24px;
        }
        
        .stat-item {
            text-align: center;
            padding: 12px 20px;
            background: var(--white);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
        }
        
        .stat-value {
            display: block;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--gray-400);
        }
        
        .summary-table-wrapper {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow-x: auto;
            margin-bottom: 24px;
        }
        
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .summary-table th {
            background: var(--gray-100);
            padding: 14px 8px;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            position: sticky;
            top: 0;
            color: var(--gray-600);
        }
        
        .summary-table td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .summary-table tbody tr:hover {
            background: var(--gray-100);
        }
        
        .summary-table tbody tr.inactive {
            opacity: 0.6;
            background: #f9fafb;
        }
        
        .tech-col {
            min-width: 140px;
            text-align: left !important;
            padding-left: 16px !important;
        }
        
        .time-col {
            min-width: 44px;
            font-size: 11px;
            color: var(--gray-400);
        }
        
        .tech-cell {
            text-align: left !important;
        }
        
        .tech-info-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .tech-avatar-sm {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
        }
        
        .tech-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .tech-status-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 2px;
        }
        
        .tech-status-badge.active {
            background: #d1fae5;
            color: #059669;
        }
        
        .tech-status-badge.inactive {
            background: var(--gray-200);
            color: var(--gray-400);
        }
        
        .rest-badge {
            background: var(--gray-100);
            color: var(--gray-500);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .work-badge {
            background: #d1fae5;
            color: #059669;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .slot-cell {
            font-size: 11px;
            cursor: default;
        }
        
        .slot-cell.available {
            color: #10b981;
        }
        
        .slot-cell.booked {
            color: var(--secondary-color);
            font-weight: 700;
        }
        
        .slot-cell.closed {
            background: #f3f4f6;
        }
        
        .rest-row {
            background: #f9fafb;
            color: var(--gray-400);
            font-size: 13px;
        }
        
        .order-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            background: var(--primary-color);
            color: white;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .summary-legend {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            padding: 16px;
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--gray-600);
        }
        
        .legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }
        
        .legend-dot.available {
            background: #d1fae5;
            color: #10b981;
        }
        
        .legend-dot.booked {
            background: #ede9fe;
            color: var(--secondary-color);
        }
        
        .legend-dot.closed {
            background: #f3f4f6;
            border: 1px solid var(--gray-200);
        }
        
        /* 新增预约表单样式 */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .summary-stats {
                gap: 12px;
            }
            
            .stat-item {
                padding: 8px 12px;
            }
            
            .stat-value {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-left">
                <span class="logo-icon">🐾</span>
                <h1>PawsUp 爪哇宠屋</h1>
            </div>
            <div class="header-right">
                <span class="admin-badge">管理员</span>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </header>
        
        <div class="dashboard-layout">
            <nav class="sidebar">
                <ul class="nav-menu">
                    <li><a href="dashboard">📊 仪表盘</a></li>
                    <li class="active"><a href="admin-appointments">📋 预约管理</a></li>
                    <li><a href="orders">📦 订单管理</a></li>
                    <li><a href="services">🛁 服务管理</a></li>
                    <li><a href="technicians">👨‍🔧 技师管理</a></li>
                    <li><a href="admin-schedule">📅 排班管理</a></li>
                    <li><a href="statistics">📈 数据统计</a></li>
                </ul>
            </nav>
            
            <main class="main-content">
                <div class="page-header">
                    <h2>预约管理</h2>
                    <button class="btn-primary" onclick="openNewAppointmentModal()">+ 新增预约</button>
                </div>
                
                <div class="summary-header">
                    <div class="date-selector">
                        <label>选择日期：</label>
                        <input type="date" id="summaryDate" class="form-control" onchange="onSummaryDateChange()">
                    </div>
                    <div class="summary-stats">
                        <div class="stat-item">
                            <span class="stat-value" id="statTotalTechs">0</span>
                            <span class="stat-label">技师总数</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="statTotalOrders">0</span>
                            <span class="stat-label">订单总数</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="statCompleted">0</span>
                            <span class="stat-label">已完成</span>
                        </div>
                    </div>
                </div>
                
                <div class="summary-table-wrapper">
                    <table class="summary-table">
                        <thead id="tableHead">
                            <tr>
                                <th class="tech-col">技师</th>
                                <th>状态</th>
                                <!-- 时间段动态生成 -->
                                <th>订单数</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>
                
                <div class="summary-legend">
                    <div class="legend-item">
                        <span class="legend-dot available">○</span>
                        <span>可预约</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot booked">●</span>
                        <span>已预约</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot closed"></span>
                        <span>未开放</span>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- 新增预约弹窗 -->
    <div class="modal" id="newAppointmentModal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3>新增预约</h3>
                <button class="close-btn" onclick="closeNewAppointmentModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="appointmentForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>客户姓名 *</label>
                            <input type="text" id="customerName" class="form-control" required placeholder="请输入客户姓名">
                        </div>
                        <div class="form-group">
                            <label>联系电话 *</label>
                            <input type="tel" id="customerPhone" class="form-control" required placeholder="请输入联系电话">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>宠物类型 *</label>
                            <select id="petType" class="form-control" required>
                                <option value="">请选择</option>
                                <option value="dog">狗狗</option>
                                <option value="cat">猫咪</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>宠物名称</label>
                            <input type="text" id="petName" class="form-control" placeholder="请输入宠物名称">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>选择服务 *</label>
                            <select id="serviceId" class="form-control" required>
                                <option value="">请选择服务</option>
                                <!-- 动态加载 -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label>选择技师 *</label>
                            <select id="techId" class="form-control" required onchange="onTechChange()">
                                <option value="">请选择技师</option>
                                <!-- 动态加载 -->
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>预约日期 *</label>
                            <input type="date" id="appointmentDate" class="form-control" required onchange="onDateChange()">
                        </div>
                        <div class="form-group">
                            <label>预约时间 *</label>
                            <select id="appointmentTime" class="form-control" required>
                                <option value="">请选择时间</option>
                                <!-- 动态加载可用时间 -->
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>备注</label>
                        <textarea id="remark" class="form-control" rows="2" placeholder="可选：特殊要求或备注"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeNewAppointmentModal()">取消</button>
                <button class="btn-primary" onclick="saveAppointment()">确认预约</button>
            </div>
        </div>
    </div>

    <script src="js/appointment-new.js"></script>
</body>
</html>
