<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API 诊断</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .test { margin: 20px 0; padding: 15px; border-radius: 8px; }
        .success { background: #d4edda; border: 1px solid #28a745; }
        .error { background: #f8d7da; border: 1px solid #dc3545; }
        .pending { background: #fff3cd; border: 1px solid #ffc107; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>API 诊断测试</h1>
    <div id="results"></div>
    
    <script>
        const API_BASE = '/api';
        const results = document.getElementById('results');
        
        function addTest(name, status, details) {
            const div = document.createElement('div');
            div.className = `test ${status}`;
            div.innerHTML = `<h3>${name}</h3><pre>${details}</pre>`;
            results.appendChild(div);
        }
        
        async function testAPI(name, endpoint, data) {
            addTest(name, 'pending', '测试中...');
            try {
                const response = await fetch(`${API_BASE}/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const text = await response.text();
                let json;
                try {
                    json = JSON.parse(text);
                } catch(e) {
                    json = null;
                }
                
                const status = response.ok ? 'success' : 'error';
                const details = `Status: ${response.status}\nHeaders: ${JSON.stringify([...response.headers])}\nBody: ${text.substring(0, 500)}`;
                
                // 更新最后一个测试
                results.lastChild.className = `test ${status}`;
                results.lastChild.innerHTML = `<h3>${name}</h3><pre>${details}</pre>`;
                
                return json;
            } catch (e) {
                results.lastChild.className = 'test error';
                results.lastChild.innerHTML = `<h3>${name}</h3><pre>Error: ${e.message}</pre>`;
                return null;
            }
        }
        
        async function runTests() {
            // 测试 Services API (已知正常的)
            await testAPI('Services API (list)', 'services', { action: 'list' });
            
            // 测试 Technicians API
            await testAPI('Technicians API (list)', 'technicians', { action: 'list' });
            
            // 测试 Schedules API
            await testAPI('Schedules API (list)', 'schedules', { action: 'list' });
        }
        
        runTests();
    </script>
</body>
</html>
