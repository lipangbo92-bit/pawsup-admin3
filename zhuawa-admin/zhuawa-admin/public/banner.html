<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner管理 - PawsUp管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .sidebar { background: #1e293b; min-height: 100vh; }
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link:hover, .sidebar-link.active { background: #334155; }
        .preview-img { max-height: 120px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body class="flex">
    <!-- 侧边栏 -->
    <aside class="sidebar w-64 text-white fixed h-full">
        <div class="p-6 border-b border-slate-700">
            <h1 class="text-xl font-bold">PawsUp 管理系统</h1>
        </div>
        <nav class="p-4 space-y-2">
            <a href="dashboard.html" class="sidebar-link block px-4 py-3 rounded-lg">📊 仪表盘</a>
            <a href="groomers.html" class="sidebar-link block px-4 py-3 rounded-lg">👤 美容师管理</a>
            <a href="services.html" class="sidebar-link block px-4 py-3 rounded-lg">🛁 服务管理</a>
            <a href="banner.html" class="sidebar-link active block px-4 py-3 rounded-lg">🖼️ Banner管理</a>
        </nav>
    </aside>

    <!-- 主内容 -->
    <main class="flex-1 ml-64 p-8">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-bold text-slate-800">Banner管理</h2>
                    <p class="text-slate-500 mt-1">管理小程序首页轮播图</p>
                </div>
                <button onclick="openModal()" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-3 rounded-lg font-medium transition flex items-center gap-2">
                    <span>+</span> 新增Banner
                </button>
            </div>

            <!-- Banner列表 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200">
                <table class="w-full">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-600">排序</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-600">图片</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-600">标题</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-600">副标题</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-600">状态</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-600">操作</th>
                        </tr>
                    </thead>
                    <tbody id="bannerList" class="divide-y divide-slate-100">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 新增/编辑弹窗 -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4">
            <div class="flex justify-between items-center p-6 border-b">
                <h3 class="text-xl font-bold text-slate-800" id="modalTitle">新增Banner</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="bannerId">
                
                <!-- 图片上传 -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Banner图片</label>
                    <div class="border-2 border-dashed border-slate-300 rounded-lg p-6 text-center hover:border-orange-400 transition">
                        <input type="file" id="bannerImage" accept="image/*" class="hidden" onchange="previewImage(event)">
                        <div id="imagePreview" onclick="document.getElementById('bannerImage').click()" class="cursor-pointer">
                            <div class="text-slate-400">
                                <svg class="w-12 h-12 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                                <p class="text-sm">点击上传图片</p>
                                <p class="text-xs text-slate-400 mt-1">建议尺寸 750×300px</p>
                            </div>
                        </div>
                        <img id="previewImg" class="hidden preview-img mx-auto">
                    </div>
                </div>

                <!-- 标题 -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">标题</label>
                    <input type="text" id="bannerTitle" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none" placeholder="例如：专业宠物美容">
                </div>

                <!-- 副标题 -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">副标题</label>
                    <input type="text" id="bannerSubtitle" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none" placeholder="例如：让您的爱宠焕然一新">
                </div>

                <!-- 排序 -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">排序</label>
                    <input type="number" id="bannerSort" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none" placeholder="数字越小越靠前" value="0">
                </div>

                <!-- 状态 -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">状态</label>
                    <select id="bannerStatus" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none">
                        <option value="active">显示</option>
                        <option value="inactive">隐藏</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end gap-3 p-6 border-t">
                <button onclick="closeModal()" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg transition">取消</button>
                <button onclick="saveBanner()" class="px-6 py-2 bg-orange-500 hover:bg-orange-600 text-white rounded-lg font-medium transition">保存</button>
            </div>
        </div>
    </div>

    <script src="js/banner.js"></script>
</body>
</html>
