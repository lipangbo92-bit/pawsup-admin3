<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>完善宠物信息 - 爪哇宠屋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#F97316',
                        'primary-light': '#FFF7ED',
                        'primary-dark': '#EA580C',
                    },
                    fontFamily: {
                        sans: ['Noto Sans SC', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto min-h-screen bg-gray-50 shadow-2xl overflow-hidden">
        
        <!-- 顶部导航栏 -->
        <div class="bg-gradient-to-r from-orange-500 to-orange-600">
            <div class="px-4 pt-12 pb-4 flex items-center justify-center relative">
                <button onclick="window.history.back()" class="absolute left-4 text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 class="text-lg font-semibold text-white">完善宠物信息</h1>
            </div>
            <!-- 进度条 -->
            <div class="flex justify-center gap-2 pb-4">
                <div class="w-6 h-1 bg-white rounded-full"></div>
                <div class="w-6 h-1 bg-white rounded-full"></div>
            </div>
        </div>
        
        <!-- 提示信息 -->
        <div class="p-4">
            <div class="bg-gradient-to-r from-yellow-50 to-orange-50 rounded-xl p-4 flex items-start gap-3 border border-orange-100">
                <span class="text-xl">💡</span>
                <div>
                    <p class="text-sm font-medium text-gray-800">首次登录福利</p>
                    <p class="text-xs text-gray-600 mt-1">完善宠物信息后，可领取新用户专属优惠券，预约服务更省心！</p>
                </div>
            </div>
        </div>
        
        <!-- 宠物头像 -->
        <div class="flex flex-col items-center py-6">
            <div class="w-24 h-24 bg-gradient-to-br from-orange-200 to-orange-300 rounded-full flex items-center justify-center relative shadow-md">
                <svg class="w-12 h-12 text-orange-600" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                </svg>
                <div class="absolute -bottom-1 -right-1 w-8 h-8 bg-primary rounded-full flex items-center justify-center shadow-md">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                    </svg>
                </div>
            </div>
            <p class="text-sm text-gray-500 mt-3">点击添加宠物照片</p>
        </div>
        
        <!-- 表单区域 -->
        <div class="p-4 pb-32">
            <!-- 昵称 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">宠物昵称 <span class="text-red-500">*</span></label>
                <input type="text" placeholder="请输入宠物昵称，如：旺财" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-orange-100">
            </div>
            
            <!-- 品种 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">宠物品种 <span class="text-red-500">*</span></label>
                <div class="flex flex-wrap gap-2 mb-3">
                    <span class="px-4 py-2 bg-primary text-white rounded-full text-xs">🐕 狗狗</span>
                    <span class="px-4 py-2 bg-white border border-gray-200 text-gray-600 rounded-full text-xs">🐈 猫咪</span>
                    <span class="px-4 py-2 bg-white border border-gray-200 text-gray-600 rounded-full text-xs">🐰 兔子</span>
                    <span class="px-4 py-2 bg-white border border-gray-200 text-gray-600 rounded-full text-xs">🐹 仓鼠</span>
                    <span class="px-4 py-2 bg-white border border-gray-200 text-gray-600 rounded-full text-xs">🦜 鸟类</span>
                    <span class="px-4 py-2 bg-white border border-gray-200 text-gray-600 rounded-full text-xs">🐢 其他</span>
                </div>
                <input type="text" placeholder="请选择或输入具体品种，如：金毛" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-orange-100">
            </div>
            
            <!-- 年龄 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">宠物年龄 <span class="text-red-500">*</span></label>
                <div class="flex gap-3">
                    <div class="flex-1 flex items-center bg-white border border-gray-200 rounded-xl overflow-hidden">
                        <input type="number" placeholder="0" min="0" class="flex-1 px-4 py-3 text-sm text-center focus:outline-none">
                        <span class="px-4 py-3 text-sm text-gray-500 border-l border-gray-200">岁</span>
                    </div>
                    <div class="flex-1 flex items-center bg-white border border-gray-200 rounded-xl overflow-hidden">
                        <input type="number" placeholder="0" min="0" max="11" class="flex-1 px-4 py-3 text-sm text-center focus:outline-none">
                        <span class="px-4 py-3 text-sm text-gray-500 border-l border-gray-200">月</span>
                    </div>
                </div>
            </div>
            
            <!-- 体重 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">宠物体重 <span class="text-red-500">*</span></label>
                <div class="bg-white rounded-xl p-4 border border-gray-200">
                    <div class="text-center text-3xl font-bold text-primary mb-4">5.0 <span class="text-sm font-normal text-gray-500">kg</span></div>
                    <div class="h-2 bg-gray-100 rounded-full relative">
                        <div class="absolute left-0 top-0 h-full w-1/4 bg-gradient-to-r from-primary to-orange-400 rounded-full"></div>
                        <div class="absolute left-1/4 top-1/2 -translate-x-1/2 -translate-y-1/2 w-5 h-5 bg-white border-2 border-primary rounded-full shadow-md"></div>
                    </div>
                    <div class="flex justify-between text-xs text-gray-500 mt-2">
                        <span>0kg</span>
                        <span>25kg</span>
                        <span>50kg+</span>
                    </div>
                </div>
            </div>
            
            <!-- 备注 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">备注信息</label>
                <textarea placeholder="请填写宠物的特殊需求或注意事项，如：怕生、对某种药物过敏等（选填）" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-orange-100 resize-none" rows="3"></textarea>
            </div>
        </div>
        
        <!-- 底部按钮 -->
        <div class="fixed bottom-16 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 p-4">
            <button onclick="submitPetInfo()" class="w-full bg-primary text-white py-4 rounded-full text-base font-semibold shadow-lg active:scale-95 transition-transform">
                完成，开始预约
            </button>
            <a href="index-new.html" class="block text-center text-sm text-gray-500 mt-3">稍后再说，先逛逛</a>
        </div>
    </div>
    
    <script>
        function submitPetInfo() {
            localStorage.setItem('hasRegisteredPet', 'true');
            window.location.href = 'index.html';
        }
    </script>

        <!-- 底部导航栏 -->
        <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 z-50">
            <div class="flex items-center justify-around py-2">
                <a href="index-new.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h3m6-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    <span class="text-[10px] mt-0.5 font-medium">首页</span>
                </a>
                <a href="services.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">服务</span>
                </a>
                <a href="orders.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">订单</span>
                </a>
                <a href="profile.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">我的</span>
                </a>
            </div>
        </div>
</body>
</html>
