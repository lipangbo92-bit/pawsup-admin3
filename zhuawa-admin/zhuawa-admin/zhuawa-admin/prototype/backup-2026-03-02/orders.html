<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的预约 - 爪哇宠屋</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F97316;
            --cta: #8B5CF6;
            --bg: #FFF7ED;
            --text: #7C2D12;
            --white: #FFFFFF;
            --gray-100: #FFEDD5;
            --green: #10B981;
            --orange: #F59E0B;
            --gray: #6B7280;
            --shadow: 0 4px 20px rgba(236, 72, 153, 0.15);
            --text-light: #BE185D;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Nunito Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding-bottom: 80px;
            max-width: 375px;
            margin: 0 auto;
            position: relative; 
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--cta) 100%);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-title {
            font-family: 'Varela Round', sans-serif;
            font-size: 20px;
            color: var(--white);
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
            background: var(--white);
        }
        .tabs::-webkit-scrollbar { display: none; }
        
        .tab {
            padding: 8px 16px;
            background: #F3F4F6;
            border-radius: 20px;
            color: #6B7280;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab.active {
            background: var(--primary);
            color: var(--white);
            font-weight: 600;
        }
        
        .order-list {
            padding: 0 16px;
        }
        
        .order-card {
            background: var(--white);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--gray-100);
        }
        
        .order-no { font-size: 12px; color: #9CA3AF; }
        
        .status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }
        .status.pending { background: #FEF3C7; color: #D97706; }
        .status.paid { background: #DBEAFE; color: #2563EB; }
        .status.completed { background: #D1FAE5; color: #059669; }
        .status.cancelled { background: #F3F4F6; color: #6B7280; }
        
        .order-body {
            display: flex;
            gap: 12px;
        }
        
        .order-img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        
        .order-info { 
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .order-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        .order-meta { font-size: 12px; color: var(--text-light); }
        
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--gray-100);
        }
        
        .order-price { font-weight: 700; color: var(--primary); font-size: 16px; }
        
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
            max-width: 375px;
            margin: 0 auto;
        }
        
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #9CA3AF;
            font-size: 10px;
            cursor: pointer;
        }
        .tab-item.active { color: var(--primary); }
        .tab-item .icon { font-size: 22px; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9CA3AF;
        }
        
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .empty-state p {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">我的预约</div>
    </div>
    
    <div class="tabs">
        <div class="tab active">全部</div>
        <div class="tab">待消费</div>
        <div class="tab">已完成</div>
        <div class="tab">已取消</div>
    </div>
    
    <div class="order-list">
        <div class="order-card">
            <div class="order-header">
                <span class="order-no">202402271530</span>
                <span class="status paid">待消费</span>
            </div>
            <div class="order-body">
                <div class="order-img">🐕</div>
                <div class="order-info">
                    <div class="order-name">狗狗洗护套餐</div>
                    <div class="order-meta">小美 · 02月27日 15:30 · 豆豆</div>
                </div>
            </div>
            <div class="order-footer">
                <span class="order-price">¥99</span>
            </div>
        </div>
        
        <div class="order-card">
            <div class="order-header">
                <span class="order-no">202402201000</span>
                <span class="status completed">已完成</span>
            </div>
            <div class="order-body">
                <div class="order-img">✂️</div>
                <div class="order-info">
                    <div class="order-name">宠物美容造型</div>
                    <div class="order-meta">Tony · 02月20日 14:00 · 豆豆</div>
                </div>
            </div>
            <div class="order-footer">
                <span class="order-price">¥199</span>
            </div>
        </div>
        
        <div class="order-card">
            <div class="order-header">
                <span class="order-no">202402151200</span>
                <span class="status cancelled">已取消</span>
            </div>
            <div class="order-body">
                <div class="order-img">🐈</div>
                <div class="order-info">
                    <div class="order-name">猫咪洗护套餐</div>
                    <div class="order-meta">小美 · 02月15日 10:00 · 咪咪</div>
                </div>
            </div>
            <div class="order-footer">
                <span class="order-price">¥129</span>
            </div>
        </div>
    </div>
    
    <div class="tab-bar">
        <div class="tab-item" onclick="window.location.href='index.html'">
            <span class="icon">🏠</span>
            <span>首页</span>
        </div>
        <div class="tab-item" onclick="window.location.href='services.html'">
            <span class="icon">📋</span>
            <span>服务</span>
        </div>
        <div class="tab-item active">
            <span class="icon">📝</span>
            <span>订单</span>
        </div>
        <div class="tab-item" onclick="window.location.href='profile.html'">
            <span class="icon">👤</span>
            <span>我的</span>
        </div>
    </div>
    
    <script>
        // Tab 切换逻辑
        document.querySelectorAll('.tabs .tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
