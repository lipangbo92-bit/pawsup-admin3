<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>预约详情 - 技师端</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #EC4899;
            --secondary: #F9A8D4;
            --cta: #8B5CF6;
            --bg: #FDF2F8;
            --text: #831843;
            --text-light: #BE185D;
            --white: #FFFFFF;
            --gray-100: #FCE7F3;
            --gray-200: #FBCFE8;
            --gray-500: #DB2777;
            --green: #10B981;
            --orange: #F59E0B;
            --red: #EF4444;
            --shadow: 0 4px 20px rgba(236, 72, 153, 0.15);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Nunito Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
        }
        
        .header {
            background: var(--white);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .back-btn {
            font-size: 20px;
            color: var(--text);
            cursor: pointer;
        }
        
        .header-title {
            font-family: 'Varela Round', sans-serif;
            font-size: 18px;
            flex: 1;
            text-align: center;
            margin-right: 32px;
        }
        
        .status-banner {
            background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
            margin: 16px;
            border-radius: 16px;
            padding: 20px;
            color: var(--white);
            text-align: center;
        }
        
        .status-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        
        .status-text {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .status-time {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .card {
            background: var(--white);
            margin: 16px;
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        
        .card-title {
            font-family: 'Varela Round', sans-serif;
            font-size: 15px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #F3F4F6;
        }
        
        .info-row:last-child { border-bottom: none; }
        
        .info-label {
            color: #6B7280;
            font-size: 14px;
        }
        
        .info-value {
            font-weight: 600;
            font-size: 14px;
        }
        
        .info-value.price {
            color: var(--primary);
            font-size: 18px;
        }
        
        .pet-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #F9FAFB;
            border-radius: 12px;
            padding: 16px;
        }
        
        .pet-avatar-large {
            width: 64px;
            height: 64px;
            background: var(--gray-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        
        .pet-info-detail {
            flex: 1;
        }
        
        .pet-name-large {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .pet-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        
        .pet-tag {
            background: var(--white);
            color: var(--text-light);
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 10px;
        }
        
        .service-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: linear-gradient(135deg, var(--gray-100) 0%, var(--white) 100%);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--gray-200);
        }
        
        .service-icon-large {
            width: 56px;
            height: 56px;
            background: var(--white);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .service-info-detail {
            flex: 1;
        }
        
        .service-name-large {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .service-duration {
            font-size: 13px;
            color: #6B7280;
        }
        
        .customer-card {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .customer-avatar {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--white);
        }
        
        .customer-detail {
            flex: 1;
        }
        
        .customer-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .customer-phone {
            font-size: 13px;
            color: #6B7280;
        }
        
        .customer-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gray-100);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
        }
        
        .icon-btn.phone {
            background: #DBEAFE;
        }
        
        .icon-btn.message {
            background: #D1FAE5;
        }
        
        .remark-box {
            background: #FEF3C7;
            border-radius: 10px;
            padding: 12px;
            font-size: 13px;
            color: #92400E;
        }
        
        .remark-label {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            padding: 16px 20px 30px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
            display: flex;
            gap: 12px;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        
        .btn-cancel {
            background: #FEE2E2;
            color: var(--red);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--cta) 100%);
            color: var(--white);
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="back-btn">←</span>
        <h1 class="header-title">预约详情</h1>
    </div>
    
    <div class="status-banner">
        <div class="status-icon">⏰</div>
        <div class="status-text">待服务</div>
        <div class="status-time">预约时间：2024年2月27日 10:00</div>
    </div>
    
    <div class="card">
        <h3 class="card-title">🐾 宠物信息</h3>
        <div class="pet-card">
            <div class="pet-avatar-large">🐶</div>
            <div class="pet-info-detail">
                <div class="pet-name-large">豆豆</div>
                <div class="pet-tags">
                    <span class="pet-tag">金毛</span>
                    <span class="pet-tag">3岁</span>
                    <span class="pet-tag">25kg</span>
                    <span class="pet-tag">公</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="card">
        <h3 class="card-title">✂️ 服务信息</h3>
        <div class="service-card">
            <div class="service-icon-large">🛁</div>
            <div class="service-info-detail">
                <div class="service-name-large">狗狗洗护套餐</div>
                <div class="service-duration">约60分钟 · 包含洗澡、吹干、修剪指甲</div>
            </div>
        </div>
    </div>
    
    <div class="card">
        <h3 class="card-title">📋 预约信息</h3>
        <div class="info-row">
            <span class="info-label">预约编号</span>
            <span class="info-value">20240227100001</span>
        </div>
        <div class="info-row">
            <span class="info-label">服务时间</span>
            <span class="info-value">2024-02-27 10:00</span>
        </div>
        <div class="info-row">
            <span class="info-label">预计时长</span>
            <span class="info-value">约60分钟</span>
        </div>
        <div class="info-row">
            <span class="info-label">服务费用</span>
            <span class="info-value price">¥99</span>
        </div>
    </div>
    
    <div class="card">
        <h3 class="card-title">👤 客户信息</h3>
        <div class="customer-card">
            <div class="customer-avatar">王</div>
            <div class="customer-detail">
                <div class="customer-name">王先生</div>
                <div class="customer-phone">138****8888</div>
            </div>
            <div class="customer-actions">
                <button class="icon-btn phone">📞</button>
                <button class="icon-btn message">💬</button>
            </div>
        </div>
    </div>
    
    <div class="card">
        <h3 class="card-title">📝 备注</h3>
        <div class="remark-box">
            <div class="remark-label">客户备注</div>
            <div>豆豆比较怕水，洗澡时请温柔对待。它对吹风机声音敏感，请使用低档。</div>
        </div>
    </div>
    
    <div class="action-bar">
        <button class="btn btn-cancel">取消预约</button>
        <button class="btn btn-primary">开始服务</button>
    </div>
</body>
</html>
