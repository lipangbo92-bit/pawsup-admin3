<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>完善宠物信息 - 爪哇宠屋</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F97316;
            --secondary: #FED7AA;
            --cta: #8B5CF6;
            --bg: #FFF7ED;
            --text: #7C2D12;
            --text-light: #C2410C;
            --white: #FFFFFF;
            --gray-100: #FFEDD5;
            --gray-200: #FED7AA;
            --gray-500: #EA580C;
            --shadow: 0 4px 20px rgba(249, 115, 22, 0.15);
            --shadow-lg: 0 8px 30px rgba(249, 115, 22, 0.2);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
            max-width: 375px;
            margin: 0 auto;
            position: relative;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--cta) 100%);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .header .back {
            position: absolute;
            left: 16px;
            color: var(--white);
            font-size: 20px;
            cursor: pointer;
        }
        
        .header h1 {
            font-family: 'Varela Round', sans-serif;
            color: var(--white);
            font-size: 18px;
        }
        
        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        
        .progress-step {
            width: 24px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }
        
        .progress-step.active {
            background: var(--white);
        }
        
        /* 宠物头像 */
        .pet-avatar-section {
            display: flex;
            justify-content: center;
            padding: 32px 20px 24px;
        }
        
        .pet-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--gray-100) 0%, var(--secondary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: var(--shadow);
            position: relative;
            cursor: pointer;
        }
        
        .pet-avatar .edit-icon {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--white);
            border: 3px solid var(--white);
        }
        
        .avatar-tip {
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 24px;
        }
        
        /* 表单区域 */
        .form-section {
            padding: 0 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            color: var(--text);
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .form-label .required {
            color: #EF4444;
            margin-left: 2px;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text);
            background: var(--white);
            transition: border-color 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-input::placeholder {
            color: #9CA3AF;
        }
        
        /* 品种选择 */
        .breed-select {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .breed-tag {
            padding: 8px 16px;
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .breed-tag.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }
        
        /* 年龄选择 */
        .age-select {
            display: flex;
            gap: 12px;
        }
        
        .age-input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .age-input-wrapper input {
            flex: 1;
            padding: 14px 16px;
            border: none;
            font-size: 15px;
            color: var(--text);
            text-align: center;
        }
        
        .age-input-wrapper input:focus {
            outline: none;
        }
        
        .age-input-wrapper .unit {
            padding: 0 16px;
            font-size: 14px;
            color: var(--text-light);
            border-left: 1px solid var(--gray-100);
        }
        
        /* 体重选择 */
        .weight-slider {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
        }
        
        .weight-display {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
        }
        
        .weight-display span {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-light);
        }
        
        .slider-track {
            height: 8px;
            background: var(--gray-100);
            border-radius: 4px;
            position: relative;
        }
        
        .slider-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--cta) 100%);
            border-radius: 4px;
        }
        
        .slider-thumb {
            position: absolute;
            left: 30%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            background: var(--white);
            border: 3px solid var(--primary);
            border-radius: 50%;
            box-shadow: var(--shadow);
        }
        
        .weight-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-light);
        }
        
        /* 备注 */
        .remark-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            font-size: 14px;
            color: var(--text);
            background: var(--white);
            min-height: 100px;
            resize: none;
        }
        
        .remark-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .remark-input::placeholder {
            color: #9CA3AF;
        }
        
        /* 底部按钮 */
        .bottom-action {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            padding: 16px 20px 30px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
            max-width: 375px;
            margin: 0 auto;
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--cta) 100%);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .submit-btn:active {
            transform: scale(0.98);
        }
        
        .submit-btn:disabled {
            background: #D1D5DB;
            cursor: not-allowed;
        }
        
        .skip-link {
            text-align: center;
            margin-top: 12px;
        }
        
        .skip-link a {
            font-size: 13px;
            color: var(--text-light);
            text-decoration: none;
        }
        
        /* 提示信息 */
        .tips-section {
            background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
            border-radius: 12px;
            padding: 16px;
            margin: 0 20px 24px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        
        .tips-icon {
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .tips-content {
            font-size: 13px;
            color: #92400E;
            line-height: 1.6;
        }
        
        .tips-content strong {
            color: #78350F;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="back" onclick="window.history.back()"><</span>
        <h1>完善宠物信息</h1>
        <div class="progress-bar">
            <div class="progress-step active"></div>
            <div class="progress-step active"></div>
        </div>
    </div>
    
    <!-- 提示信息 -->
    <div style="padding-top: 16px;">
        <div class="tips-section">
            <span class="tips-icon">💡</span>
            <div class="tips-content">
                <strong>首次登录福利</strong><br>
                完善宠物信息后，可领取新用户专属优惠券，预约服务更省心！
            </div>
        </div>
    </div>
    
    <!-- 宠物头像 -->
    <div class="pet-avatar-section">
        <div class="pet-avatar">
            🐕
            <div class="edit-icon">📷</div>
        </div>
    </div>
    <div class="avatar-tip">点击添加宠物照片</div>
    
    <!-- 表单区域 -->
    <div class="form-section">
        <!-- 昵称 -->
        <div class="form-group">
            <label class="form-label">宠物昵称<span class="required">*</span></label>
            <input type="text" class="form-input" placeholder="请输入宠物昵称，如：旺财">
        </div>
        
        <!-- 品种 -->
        <div class="form-group">
            <label class="form-label">宠物品种<span class="required">*</span></label>
            <div class="breed-select">
                <span class="breed-tag active">🐕 狗狗</span>
                <span class="breed-tag">🐈 猫咪</span>
                <span class="breed-tag">🐰 兔子</span>
                <span class="breed-tag">🐹 仓鼠</span>
                <span class="breed-tag">🦜 鸟类</span>
                <span class="breed-tag">🐢 其他</span>
            </div>
            <input type="text" class="form-input" style="margin-top: 12px;" placeholder="请选择或输入具体品种，如：金毛">
        </div>
        
        <!-- 年龄 -->
        <div class="form-group">
            <label class="form-label">宠物年龄<span class="required">*</span></label>
            <div class="age-select">
                <div class="age-input-wrapper">
                    <input type="number" placeholder="0" min="0">
                    <span class="unit">岁</span>
                </div>
                <div class="age-input-wrapper">
                    <input type="number" placeholder="0" min="0" max="11">
                    <span class="unit">月</span>
                </div>
            </div>
        </div>
        
        <!-- 体重 -->
        <div class="form-group">
            <label class="form-label">宠物体重<span class="required">*</span></label>
            <div class="weight-slider">
                <div class="weight-display">5.0 <span>kg</span></div>
                <div class="slider-track">
                    <div class="slider-progress"></div>
                    <div class="slider-thumb"></div>
                </div>
                <div class="weight-labels">
                    <span>0kg</span>
                    <span>25kg</span>
                    <span>50kg+</span>
                </div>
            </div>
        </div>
        
        <!-- 备注 -->
        <div class="form-group">
            <label class="form-label">备注信息</label>
            <textarea class="remark-input" placeholder="请填写宠物的特殊需求或注意事项，如：怕生、对某种药物过敏等（选填）"></textarea>
        </div>
    </div>
    
    <!-- 底部按钮 -->
    <div class="bottom-action">
        <button class="submit-btn" onclick="submitPetInfo()">完成，开始预约</button>
        <div class="skip-link">
            <a href="index.html">稍后再说，先逛逛</a>
        </div>
    </div>
    
    <script>
        function submitPetInfo() {
            const petName = document.querySelector('.form-input').value.trim();
            
            if (!petName) {
                alert('请输入宠物昵称');
                return;
            }
            
            // 保存宠物信息到本地存储
            localStorage.setItem('hasRegisteredPet', 'true');
            
            // 跳转到首页
            window.location.href = 'index.html';
        }
    </script>
    
    <!-- 底部Tab栏 -->
    <div class="tab-bar">
        <div class="tab-item" onclick="window.location.href='index.html'">
            <span class="icon">🏠</span>
            <span>首页</span>
        </div>
        <div class="tab-item" onclick="window.location.href='services.html'">
            <span class="icon">📋</span>
            <span>服务</span>
        </div>
        <div class="tab-item" onclick="window.location.href='orders.html'">
            <span class="icon">📝</span>
            <span>订单</span>
        </div>
        <div class="tab-item" onclick="window.location.href='profile.html'">
            <span class="icon">👤</span>
            <span>我的</span>
        </div>
    </div>
    
    <style>
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
            max-width: 375px;
            margin: 0 auto;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #9CA3AF;
            font-size: 10px;
            cursor: pointer;
        }
        .tab-item.active {
            color: var(--primary);
        }
        .tab-item .icon {
            font-size: 22px;
        }
    </style>
</body>
</html>
