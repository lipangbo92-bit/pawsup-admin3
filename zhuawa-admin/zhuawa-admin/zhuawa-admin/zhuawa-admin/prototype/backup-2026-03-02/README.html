<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物店小程序原型图 - 目录</title>
    <style>
        :root {
            --primary: #EC4899;
            --cta: #8B5CF6;
            --bg: #FDF2F8;
            --admin: #0EA5E9;
            --tech: #F59E0B;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
            font-size: 24px;
        }
        .section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(236, 72, 153, 0.1);
        }
        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #831843;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .page-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .page-item {
            display: block;
            padding: 12px 16px;
            background: #FCE7F3;
            border-radius: 10px;
            text-decoration: none;
            color: #831843;
            font-size: 14px;
            transition: all 0.2s;
        }
        .page-item:hover {
            background: var(--primary);
            color: white;
        }
        .admin .page-item:hover { background: var(--admin); }
        .tech .page-item:hover { background: var(--tech); }
        
        .admin .section-title { color: #0C4A6E; }
        .admin .page-item { background: #E0F2FE; color: #0C4A6E; }
        
        .tech .section-title { color: #78350F; }
        .tech .page-item { background: #FEF3C7; color: #78350F; }

        .login .section-title { color: #4B5563; }
        .login .page-item { background: #F3F4F6; color: #4B5563; }
        .login .page-item:hover { background: #6B7280; }
    </style>
</head>
<body>
    <h1>🐾 爪哇宠屋 - 原型图汇总</h1>
    
    <!-- 顾客端 -->
    <div class="section">
        <div class="section-title">📱 顾客端</div>
        <div class="page-list">
            <a class="page-item" href="login.html">0. 登录</a>
            <a class="page-item" href="index-user.html">1. 首页</a>
            <a class="page-item" href="services.html">2. 服务项目</a>
            <a class="page-item" href="pet-select.html">3. 选择宠物</a>
            <a class="page-item" href="pet-register.html">4. 新增宠物</a>
            <a class="page-item" href="booking-time.html">5. 预约选择 - 选择时间</a>
            <a class="page-item" href="booking-confirm.html">6. 预约确认</a>
            <a class="page-item" href="booking-success.html">7. 预约成功</a>
            <a class="page-item" href="orders.html">8. 预约记录</a>
            <a class="page-item" href="order-detail.html">9. 预约详情</a>
            <a class="page-item" href="profile.html">10. 我的</a>
        </div>
    </div>

    <!-- 管理员端 -->
    <div class="section admin">
        <div class="section-title">⚙️ 管理端</div>
        <div class="page-list">
            <a class="page-item" href="admin-login.html">1. 管理员登录</a>
            <a class="page-item" href="admin-dashboard.html">2. 数据概览</a>
            <a class="page-item" href="admin-appointments.html">3. 预约管理</a>
            <a class="page-item" href="admin-services.html">4. 服务项目管理</a>
            <a class="page-item" href="admin-technicians.html">5. 技师管理</a>
            <a class="page-item" href="admin-schedule.html">6. 排班管理</a>
            <a class="page-item" href="admin-statistics.html">7. 数据统计</a>
        </div>
    </div>

    <!-- 技师端 -->
    <div class="section tech">
        <div class="section-title">🔧 技师端</div>
        <div class="page-list">
            <a class="page-item" href="technician-login.html">1. 技师登录</a>
            <a class="page-item" href="technician-appointments.html">2. 今日预约</a>
            <a class="page-item" href="technician-appointment-detail.html">3. 预约详情</a>
            <a class="page-item" href="technician-schedule.html">4. 我的排班</a>
        </div>
    </div>

    <!-- 登录页 -->
    <div class="section login">
        <div class="section-title">🔐 登录</div>
        <div class="page-list">
            <a class="page-item" href="login.html">顾客登录</a>
        </div>
    </div>
</body>
</html>
