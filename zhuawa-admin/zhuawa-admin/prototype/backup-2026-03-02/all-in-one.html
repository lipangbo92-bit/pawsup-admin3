    <style>

        body {

            padding: 20px;
        }
        h1 { 
            text-align: center;

            gap: 8px;
        }
        .page-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .page-item {

            padding: 16px 20px;
            background: #FFEDD5;
            border-radius: 12px;
            text-decoration: none;
            color: #7C2D12;
            font-size: 14px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .page-item:hover {
            background: #F97316;
            color: white;
            transform: translateY(-2px);
        }
        .page-item .emoji {
            font-size: 20px;
            margin-right: 8px;
        }
        .count-badge {
            background: #F97316;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
