<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>服务项目 - 爪哇宠屋</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F97316;
            --secondary: #FCE7F3;
            --cta: #8B5CF6;
            --bg: #FDF2F8;
            --text: #831843;
            --text-light: #BE185D;
            --white: #FFFFFF;
            --gray-100: #FCE7F3;
            --gray-200: #FBCFE8;
            --gray-50: #F9FAFB;
            --shadow: 0 4px 20px rgba(236, 72, 153, 0.15);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Nunito Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
            max-width: 375px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--cta) 100%);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            position: relative;
        }
        
        .header .back {
            position: absolute;
            left: 16px;
            color: var(--white);
            font-size: 20px;
            cursor: pointer;
        }
        
        .header h1 {
            font-family: 'Varela Round', sans-serif;
            color: var(--white);
            font-size: 18px;
        }
        
        /* 左右分栏布局 */
        .main-content {
            display: flex;
            min-height: calc(100vh - 60px - 80px);
        }
        
        /* 左侧分类导航 */
        .category-sidebar {
            width: 80px;
            background: var(--gray-50);
            flex-shrink: 0;
            padding: 12px 0;
        }
        
        .category-item {
            padding: 14px 8px;
            text-align: center;
            font-size: 13px;
            color: #6B7280;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        
        .category-item.active {
            background: var(--white);
            color: var(--primary);
            font-weight: 600;
            border-left-color: var(--primary);
        }
        
        .category-item .badge {
            display: none;
            width: 6px;
            height: 6px;
            background: #EF4444;
            border-radius: 50%;
            margin: 4px auto 0;
        }
        
        .category-item.active .badge {
            display: block;
        }
        
        /* 右侧服务列表 */
        .service-area {
            flex: 1;
            background: var(--white);
            padding: 12px;
        }
        
        .service-card {
            background: var(--gray-50);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .service-card:last-child {
            margin-bottom: 0;
        }
        
        .service-card .img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--gray-100) 0%, var(--gray-200) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
        }
        
        .service-card .info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }
        
        .service-card .name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .service-card .desc {
            font-size: 11px;
            color: #9CA3AF;
            line-height: 1.4;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .service-card .bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .service-card .price {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .service-card .price span {
            font-size: 11px;
            font-weight: 400;
        }
        
        .service-card .add-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--cta) 100%);
            color: var(--white);
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
            max-width: 375px;
            margin: 0 auto;
        }
        
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #9CA3AF;
            font-size: 10px;
            cursor: pointer;
        }
        
        .tab-item.active {
            color: var(--primary);
        }
        
        .tab-item .icon {
            font-size: 22px;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="back" onclick="window.history.back()"><</span>
        <h1>服务项目</h1>
    </div>
    
    <div class="main-content">
        <!-- 左侧分类导航 -->
        <div class="category-sidebar">
            <div class="category-item active">
                推荐
                <div class="badge"></div>
            </div>
            <div class="category-item">基础护理</div>
            <div class="category-item">美容</div>
            <div class="category-item">SPA</div>
            <div class="category-item">寄养</div>
            <div class="category-item">医疗</div>
            <div class="category-item">周边</div>
        </div>
        
        <!-- 右侧服务列表 -->
        <div class="service-area">
            <div class="service-card">
                <div class="img">🛁</div>
                <div class="info">
                    <div class="name">狗狗基础洗护</div>
                    <div class="desc">洗澡、吹干、基础清理，约60分钟</div>
                    <div class="bottom">
                        <div class="price">¥99 <span>起</span></div>
                        <button class="add-btn">+</button>
                    </div>
                </div>
            </div>
            
            <div class="service-card">
                <div class="img">🐈</div>
                <div class="info">
                    <div class="name">猫咪轻柔洗护</div>
                    <div class="desc">轻柔沐浴、精细护理，约90分钟</div>
                    <div class="bottom">
                        <div class="price">¥129 <span>起</span></div>
                        <button class="add-btn">+</button>
                    </div>
                </div>
            </div>
            
            <div class="service-card">
                <div class="img">✂️</div>
                <div class="info">
                    <div class="name">美容造型</div>
                    <div class="desc">专业造型、精细修剪，约120分钟</div>
                    <div class="bottom">
                        <div class="price">¥199 <span>起</span></div>
                        <button class="add-btn">+</button>
                    </div>
                </div>
            </div>
            
            <div class="service-card">
                <div class="img">🏠</div>
                <div class="info">
                    <div class="name">宠物寄养</div>
                    <div class="desc">舒适笼位、每日运动、专业陪玩</div>
                    <div class="bottom">
                        <div class="price">¥80 <span>/晚</span></div>
                        <button class="add-btn">+</button>
                    </div>
                </div>
            </div>
            
            <div class="service-card">
                <div class="img">🚪</div>
                <div class="info">
                    <div class="name">上门接送</div>
                    <div class="desc">专车接送、安全保障、方便快捷</div>
                    <div class="bottom">
                        <div class="price">¥30 <span>/次</span></div>
                        <button class="add-btn">+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="tab-bar">
        <div class="tab-item" onclick="window.location.href='index.html'">
            <span class="icon">🏠</span>
            <span>首页</span>
        </div>
        <div class="tab-item active">
            <span class="icon">📋</span>
            <span>服务</span>
        </div>
        <div class="tab-item" onclick="window.location.href='orders.html'">
            <span class="icon">📝</span>
            <span>订单</span>
        </div>
        <div class="tab-item" onclick="window.location.href='profile.html'">
            <span class="icon">👤</span>
            <span>我的</span>
        </div>
    </div>
</body>
</html>
