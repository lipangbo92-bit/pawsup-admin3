<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的预约 - 栖游记</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #EC4899;
            --cta: #8B5CF6;
            --bg: #FDF2F8;
            --text: #831843;
            --white: #FFFFFF;
            --gray-100: #FCE7F3;
            --green: #10B981;
            --orange: #F59E0B;
            --gray: #6B7280;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--cta) 100%);
            padding: 40px 20px 60px;
        }
        
        .header-title {
            font-family: 'Varela Round', sans-serif;
            font-size: 24px;
            color: var(--white);
            margin-bottom: 20px;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .tabs::-webkit-scrollbar { display: none; }
        
        .tab {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            color: var(--white);
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
        }
        .tab.active {
            background: var(--white);
            color: var(--primary);
            font-weight: 600;
        }
        
        .order-list {
            margin-top: -30px;
            padding: 0 16px;
        }
        
        .order-card {
            background: var(--white);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(236, 72, 153, 0.1);
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--gray-100);
        }
        
        .order-no { font-size: 12px; color: #9CA3AF; }
        
        .status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }
        .status.pending { background: #FEF3C7; color: #D97706; }
        .status.paid { background: #DBEAFE; color: #2563EB; }
        .status.completed { background: #D1FAE5; color: #059669; }
        .status.cancelled { background: #F3F4F6; color: #6B7280; }
        
        .order-body {
            display: flex;
            gap: 12px;
        }
        
        .order-img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .order-info { flex: 1; }
        .order-name { font-weight: 600; margin-bottom: 4px; }
        .order-meta { font-size: 12px; color: #6B7280; }
        
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--gray-100);
        }
        
        .order-price { font-weight: 700; color: var(--primary); font-size: 16px; }
        
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
        }
        
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #9CA3AF;
            font-size: 10px;
        }
        .tab-item.active { color: var(--primary); }
        .tab-item .icon { font-size: 22px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">我的预约</div>
        <div class="tabs">
            <div class="tab active">全部</div>
            <div class="tab">待消费</div>
            <div class="tab">已完成</div>
            <div class="tab">已取消</div>
        </div>
    </div>
    
    <div class="order-list">
        <div class="order-card">
            <div class="order-header">
                <span class="order-no">202402271530</span>
                <span class="status paid">待消费</span>
            </div>
            <div class="order-body">
                <div class="order-img">🐕</div>
                <div class="order-info">
                    <div class="order-name">狗狗洗护套餐</div>
                    <div class="order-meta">小美 · 02月27日 15:30 · 豆豆</div>
                </div>
            </div>
            <div class="order-footer">
                <span class="order-price">¥99</span>
            </div>
        </div>
        
        <div class="order-card">
            <div class="order-header">
                <span class="order-no">202402201000</span>
                <span class="status completed">已完成</span>
            </div>
            <div class="order-body">
                <div class="order-img">✂️</div>
                <div class="order-info">
                    <div class="order-name">宠物美容造型</div>
                    <div class="order-meta">Tony · 02月20日 14:00 · 豆豆</div>
                </div>
            </div>
            <div class="order-footer">
                <span class="order-price">¥199</span>
            </div>
        </div>
        
        <div class="order-card">
            <div class="order-header">
                <span class="order-no">202402151200</span>
                <span class="status cancelled">已取消</span>
            </div>
            <div class="order-body">
                <div class="order-img">🐈</div>
                <div class="order-info">
                    <div class="order-name">猫咪洗护套餐</div>
                    <div class="order-meta">小美 · 02月15日 10:00 · 咪咪</div>
                </div>
            </div>
            <div class="order-footer">
                <span class="order-price">¥129</span>
            </div>
        </div>
    </div>
    
    <div class="tab-bar">
        <div class="tab-item">
            <span class="icon">🏠</span>
            <span>首页</span>
        </div>
        <div class="tab-item">
            <span class="icon">🛒</span>
            <span>商城</span>
        </div>
        <div class="tab-item">
            <span class="icon">📋</span>
            <span>服务</span>
        </div>
        <div class="tab-item active">
            <span class="icon">📋</span>
            <span>订单</span>
        </div>
        <div class="tab-item">
            <span class="icon">👤</span>
            <span>我的</span>
        </div>
    </div>
</body>
</html>
