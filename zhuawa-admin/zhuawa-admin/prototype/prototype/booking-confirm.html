<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确认预约 - 栖游记</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #EC4899;
            --cta: #8B5CF6;
            --bg: #FDF2F8;
            --text: #831843;
            --white: #FFFFFF;
            --gray-100: #FCE7F3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        .header {
            background: var(--white);
            padding: 16px 20px;
            text-align: center;
        }
        .title { font-family: 'Varela Round', sans-serif; font-size: 18px; }
        
        .card {
            background: var(--white);
            margin: 16px;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(236, 72, 153, 0.1);
        }
        
        .card-title {
            font-family: 'Varela Round', sans-serif;
            font-size: 15px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 14px;
            border-bottom: 1px solid var(--gray-100);
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #6B7280; }
        .info-value { font-weight: 600; }
        
        .total {
            background: var(--white);
            margin: 16px;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(236, 72, 153, 0.1);
        }
        .total-label { font-size: 16px; font-weight: 600; }
        .total-value { font-size: 28px; font-weight: 700; color: var(--primary); }
        
        .notice {
            background: var(--gray-100);
            margin: 16px;
            border-radius: 12px;
            padding: 16px;
            font-size: 12px;
            color: #6B7280;
            line-height: 1.6;
        }
        
        .fixed-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            padding: 16px 20px 30px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
        }
        .pay-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--cta) 100%);
            color: var(--white);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">确认预约</div>
    </div>
    
    <div class="card">
        <div class="card-title">📋 预约信息</div>
        <div class="info-row">
            <span class="info-label">服务项目</span>
            <span class="info-value">狗狗洗护套餐</span>
        </div>
        <div class="info-row">
            <span class="info-label">服务技师</span>
            <span class="info-value">小美</span>
        </div>
        <div class="info-row">
            <span class="info-label">服务宠物</span>
            <span class="info-value">豆豆</span>
        </div>
        <div class="info-row">
            <span class="info-label">预约时间</span>
            <span class="info-value">2024年2月27日 15:30</span>
        </div>
        <div class="info-row">
            <span class="info-label">服务时长</span>
            <span class="info-value">约60分钟</span>
        </div>
    </div>
    
    <div class="total">
        <span class="total-label">应付金额</span>
        <span class="total-value">¥99</span>
    </div>
    
    <div class="notice">
        ⚠️ 取消政策：预约时间前3小时可取消，全额退款；3小时内取消，不退款。请合理安排您的时间。
    </div>
    
    <div class="fixed-bottom">
        <button class="pay-btn">确认支付 ¥99</button>
    </div>
</body>
</html>
