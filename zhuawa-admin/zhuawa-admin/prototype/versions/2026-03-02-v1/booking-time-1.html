<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>选择时间 - 爪哇宠屋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#F97316',
                        'primary-light': '#FFF7ED',
                        'primary-dark': '#EA580C',
                    },
                    fontFamily: {
                        sans: ['Noto Sans SC', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto min-h-screen bg-gray-50 shadow-2xl overflow-y-auto pb-32">
        
        <!-- 顶部导航栏 -->
        <div class="bg-gradient-to-r from-orange-500 to-orange-600">
            <div class="px-4 pt-12 pb-4 flex items-center justify-center relative">
                <button onclick="window.history.back()" class="absolute left-4 text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 class="text-lg font-semibold text-white">选择时间</h1>
            </div>
        </div>
        
        <!-- 步骤指示器 - 路径1：服务 → 时间 → 技师 -->
        <div class="flex items-center justify-center gap-2 p-3 bg-white border-b border-gray-100">
            <div class="flex items-center gap-1">
                <div class="w-5 h-5 bg-green-500 rounded-full flex items-center justify-center">
                    <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                </div>
                <span class="text-xs text-gray-600">服务</span>
            </div>
            <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            <div class="flex items-center gap-1">
                <div class="w-5 h-5 bg-primary rounded-full flex items-center justify-center text-xs text-white font-bold">2</div>
                <span class="text-xs text-primary font-medium">时间</span>
            </div>
            <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            <div class="flex items-center gap-1">
                <div class="w-5 h-5 bg-gray-200 rounded-full flex items-center justify-center text-xs text-gray-500 font-bold">3</div>
                <span class="text-xs text-gray-400">技师</span>
            </div>
        </div>
        
        <!-- 选择日期 -->
        <div class="p-4">
            <h3 class="text-base font-semibold text-gray-800 mb-3">📅 选择日期</h3>
            <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
                <div class="flex-shrink-0 w-14 py-3 bg-white rounded-xl text-center border-2 border-transparent">
                    <div class="text-xs text-gray-500">周一</div>
                    <div class="text-lg font-bold text-gray-800">26</div>
                </div>
                <div class="flex-shrink-0 w-14 py-3 bg-primary rounded-xl text-center border-2 border-primary">
                    <div class="text-xs text-white opacity-80">周二</div>
                    <div class="text-lg font-bold text-white">27</div>
                </div>
                <div class="flex-shrink-0 w-14 py-3 bg-white rounded-xl text-center border-2 border-transparent">
                    <div class="text-xs text-gray-500">周三</div>
                    <div class="text-lg font-bold text-gray-800">28</div>
                </div>
                <div class="flex-shrink-0 w-14 py-3 bg-white rounded-xl text-center border-2 border-transparent">
                    <div class="text-xs text-gray-500">周四</div>
                    <div class="text-lg font-bold text-gray-800">29</div>
                </div>
                <div class="flex-shrink-0 w-14 py-3 bg-white rounded-xl text-center border-2 border-transparent">
                    <div class="text-xs text-gray-500">周五</div>
                    <div class="text-lg font-bold text-gray-800">1</div>
                </div>
                <div class="flex-shrink-0 w-14 py-3 bg-white rounded-xl text-center border-2 border-transparent">
                    <div class="text-xs text-gray-500">周六</div>
                    <div class="text-lg font-bold text-gray-800">2</div>
                </div>
                <div class="flex-shrink-0 w-14 py-3 bg-white rounded-xl text-center border-2 border-transparent">
                    <div class="text-xs text-gray-500">周日</div>
                    <div class="text-lg font-bold text-gray-800">3</div>
                </div>
            </div>
        </div>
        
        <!-- 选择时间 -->
        <div class="px-4">
            <h3 class="text-base font-semibold text-gray-800 mb-3">🕐 选择时间</h3>
            <div class="grid grid-cols-4 gap-3">
                <div class="py-3 bg-white rounded-xl text-center text-sm text-gray-700 border-2 border-transparent shadow-sm">09:00</div>
                <div class="py-3 bg-white rounded-xl text-center text-sm text-gray-700 border-2 border-transparent shadow-sm">09:30</div>
                <div class="py-3 bg-white rounded-xl text-center text-sm text-gray-700 border-2 border-transparent shadow-sm">10:00</div>
                <div class="py-3 bg-white rounded-xl text-center text-sm text-gray-700 border-2 border-transparent shadow-sm">10:30</div>
                <div class="py-3 bg-gray-100 rounded-xl text-center text-sm text-gray-400 line-through">11:00</div>
                <div class="py-3 bg-gray-100 rounded-xl text-center text-sm text-gray-400 line-through">11:30</div>
                <div class="py-3 bg-white rounded-xl text-center text-sm text-gray-700 border-2 border-transparent shadow-sm">14:00</div>
                <div class="py-3 bg-white rounded-xl text-center text-sm text-gray-700 border-2 border-transparent shadow-sm">14:30</div>
                <div class="py-3 bg-white rounded-xl text-center text-sm text-gray-700 border-2 border-transparent shadow-sm">15:00</div>
                <div class="py-3 bg-primary rounded-xl text-center text-sm text-white border-2 border-primary shadow-sm">15:30</div>
                <div class="py-3 bg-white rounded-xl text-center text-sm text-gray-700 border-2 border-transparent shadow-sm">16:00</div>
                <div class="py-3 bg-white rounded-xl text-center text-sm text-gray-700 border-2 border-transparent shadow-sm">16:30</div>
            </div>
        </div>
        
        <!-- 选择技师 -->
        <div class="p-4 mt-4">
            <h3 class="text-base font-semibold text-gray-800 mb-3">👨‍🎨 选择技师</h3>
            <div class="space-y-3">
                <!-- 技师1 -->
                <div class="flex items-center p-3 bg-white rounded-xl border-2 border-transparent hover:border-primary cursor-pointer">
                    <div class="w-12 h-12 bg-gradient-to-br from-orange-300 to-orange-400 rounded-full flex items-center justify-center text-white font-bold">李</div>
                    <div class="ml-3 flex-1">
                        <div class="flex items-center">
                            <span class="text-sm font-semibold text-gray-800">李明</span>
                            <span class="ml-2 text-xs text-orange-500 bg-orange-50 px-2 py-0.5 rounded-full">首席</span>
                        </div>
                        <div class="text-xs text-gray-500 mt-1">⭐ 4.9分 · 8年经验</div>
                    </div>
                    <div class="w-5 h-5 border-2 border-primary rounded-full"></div>
                </div>
                <!-- 技师2 -->
                <div class="flex items-center p-3 bg-white rounded-xl border-2 border-transparent hover:border-primary cursor-pointer">
                    <div class="w-12 h-12 bg-gradient-to-br from-pink-300 to-pink-400 rounded-full flex items-center justify-center text-white font-bold">王</div>
                    <div class="ml-3 flex-1">
                        <div class="flex items-center">
                            <span class="text-sm font-semibold text-gray-800">王雪</span>
                            <span class="ml-2 text-xs text-pink-500 bg-pink-50 px-2 py-0.5 rounded-full">高级</span>
                        </div>
                        <div class="text-xs text-gray-500 mt-1">⭐ 4.8分 · 5年经验</div>
                    </div>
                    <div class="w-5 h-5 border-2 border-gray-300 rounded-full"></div>
                </div>
                <!-- 技师3 -->
                <div class="flex items-center p-3 bg-white rounded-xl border-2 border-transparent hover:border-primary cursor-pointer">
                    <div class="w-12 h-12 bg-gradient-to-br from-blue-300 to-blue-400 rounded-full flex items-center justify-center text-white font-bold">张</div>
                    <div class="ml-3 flex-1">
                        <div class="flex items-center">
                            <span class="text-sm font-semibold text-gray-800">张伟</span>
                            <span class="ml-2 text-xs text-blue-500 bg-blue-50 px-2 py-0.5 rounded-full">资深</span>
                        </div>
                        <div class="text-xs text-gray-500 mt-1">⭐ 4.9分 · 6年经验</div>
                    </div>
                    <div class="w-5 h-5 border-2 border-gray-300 rounded-full"></div>
                </div>
            </div>
        </div>
        
        <!-- 底部按钮 -->
        <div class="fixed bottom-16 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 p-4">
            <button onclick="window.location.href='booking-confirm.html'" class="w-full bg-primary text-white py-4 rounded-full text-base font-semibold shadow-lg active:scale-95 transition-transform">
                下一步
            </button>
        </div>
    </div>

        <!-- 底部导航栏 -->
        <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 z-50">
            <div class="flex items-center justify-around py-2">
                <a href="index-new.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h3m6-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    <span class="text-[10px] mt-0.5 font-medium">首页</span>
                </a>
                <a href="services.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">服务</span>
                </a>
                <a href="orders.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">订单</span>
                </a>
                <a href="profile.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">我的</span>
                </a>
            </div>
        </div>
</body>
</html>
