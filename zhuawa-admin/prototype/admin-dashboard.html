<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>仪表盘 - 管理端</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F97316;
            --secondary: #FED7AA;
            --cta: #8B5CF6;
            --bg: #FFF7ED;
            --text: #7C2D12;
            --text-light: #C2410C;
            --white: #FFFFFF;
            --gray-100: #FFEDD5;
            --gray-200: #FED7AA;
            --gray-500: #EA580C;
            --green: #10B981;
            --orange: #F59E0B;
            --red: #EF4444;
            --shadow: 0 4px 20px rgba(249, 115, 22, 0.15);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Nunito Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 220px;
            background: var(--white);
            padding: 24px 0;
            box-shadow: 2px 0 20px rgba(0,0,0,0.05);
            z-index: 100;
        }
        
        .logo-section {
            padding: 0 20px 24px;
            border-bottom: 1px solid var(--gray-100);
            margin-bottom: 16px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Varela Round', sans-serif;
            font-size: 20px;
            color: var(--primary);
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: #6B7280;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover, .nav-item.active {
            background: var(--gray-100);
            color: var(--primary);
            border-left-color: var(--primary);
        }
        
        .nav-item .icon {
            font-size: 18px;
        }
        
        .main-content {
            margin-left: 220px;
            padding: 24px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .page-title {
            font-family: 'Varela Round', sans-serif;
            font-size: 24px;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .date-display {
            background: var(--white);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            color: #6B7280;
        }
        
        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--white);
            padding: 8px 14px;
            border-radius: 20px;
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 14px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--white);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        .stat-icon.pink { background: var(--gray-100); }
        .stat-icon.blue { background: #DBEAFE; }
        .stat-icon.green { background: #D1FAE5; }
        .stat-icon.orange { background: #FEF3C7; }
        
        .stat-trend {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .stat-trend.up {
            background: #D1FAE5;
            color: #059669;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 13px;
            color: #6B7280;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        
        .card {
            background: var(--white);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .card-title {
            font-family: 'Varela Round', sans-serif;
            font-size: 16px;
        }
        
        .card-action {
            font-size: 13px;
            color: var(--primary);
            cursor: pointer;
        }
        
        .chart-placeholder {
            height: 200px;
            background: linear-gradient(135deg, var(--gray-100) 0%, var(--white) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9CA3AF;
            font-size: 14px;
        }
        
        .appointment-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .mini-appointment {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #F9FAFB;
            border-radius: 10px;
        }
        
        .mini-time {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            min-width: 50px;
        }
        
        .mini-info {
            flex: 1;
        }
        
        .mini-service {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        
        .mini-customer {
            font-size: 12px;
            color: #6B7280;
        }
        
        .mini-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 10px;
            font-weight: 500;
        }
        
        .mini-status.pending {
            background: #FEF3C7;
            color: #D97706;
        }
        
        .mini-status.confirmed {
            background: #DBEAFE;
            color: #2563EB;
        }
        
        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-section">
            <div class="logo">
                <span>🐾</span>
                <span>爪哇后台管理</span>
            </div>
        </div>
        <nav>
            <div class="nav-item active">
                <span class="icon">📊</span>
                <span>仪表盘</span>
            </div>
            <div class="nav-item" onclick="window.location.href='admin-appointments.html'">
                <span class="icon">📋</span>
                <span>预约管理</span>
            </div>
            <div class="nav-item" onclick="window.location.href='admin-technicians.html'">
                <span class="icon">👥</span>
                <span>技师管理</span>
            </div>
            <div class="nav-item" onclick="window.location.href='admin-schedule.html'">
                <span class="icon">📅</span>
                <span>排班管理</span>
            </div>
            <div class="nav-item" onclick="window.location.href='admin-services.html'">
                <span class="icon">✂️</span>
                <span>服务管理</span>
            </div>
            <div class="nav-item" onclick="window.location.href='admin-statistics.html'">
                <span class="icon">📈</span>
                <span>数据统计</span>
            </div>
            <div class="nav-item">
                <span class="icon">⚙️</span>
                <span>系统设置</span>
            </div>
        </nav>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h1 class="page-title">📊 仪表盘</h1>
            <div class="header-actions">
                <span class="date-display">📅 2024年2月27日 星期二</span>
                <div class="user-badge">
                    <span class="user-avatar">管</span>
                    <span>管理员</span>
                </div>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon pink">📋</div>
                    <span class="stat-trend up">+12%</span>
                </div>
                <div class="stat-value">28</div>
                <div class="stat-label">今日预约</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon blue">💰</div>
                    <span class="stat-trend up">+8%</span>
                </div>
                <div class="stat-value">¥3,680</div>
                <div class="stat-label">今日收入</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon green">✅</div>
                    <span class="stat-trend up">+5%</span>
                </div>
                <div class="stat-value">18</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon orange">⏰</div>
                    <span class="stat-trend up">+2</span>
                </div>
                <div class="stat-value">6</div>
                <div class="stat-label">待服务</div>
            </div>
        </div>
        
        <div class="dashboard-grid">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">📈 本周收入趋势</h3>
                    <span class="card-action">查看详情 →</span>
                </div>
                <div class="chart-placeholder">
                    📊 收入趋势图表区域
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">📋 今日预约</h3>
                    <span class="card-action">全部 →</span>
                </div>
                <div class="appointment-list">
                    <div class="mini-appointment">
                        <span class="mini-time">10:00</span>
                        <div class="mini-info">
                            <div class="mini-service">狗狗洗护套餐</div>
                            <div class="mini-customer">小美 · 豆豆</div>
                        </div>
                        <span class="mini-status confirmed">已确认</span>
                    </div>
                    <div class="mini-appointment">
                        <span class="mini-time">11:30</span>
                        <div class="mini-info">
                            <div class="mini-service">猫咪洗护套餐</div>
                            <div class="mini-customer">Tony · 咪咪</div>
                        </div>
                        <span class="mini-status pending">待确认</span>
                    </div>
                    <div class="mini-appointment">
                        <span class="mini-time">14:00</span>
                        <div class="mini-info">
                            <div class="mini-service">宠物美容造型</div>
                            <div class="mini-customer">小美 · 小白</div>
                        </div>
                        <span class="mini-status confirmed">已确认</span>
                    </div>
                    <div class="mini-appointment">
                        <span class="mini-time">15:30</span>
                        <div class="mini-info">
                            <div class="mini-service">狗狗洗护套餐</div>
                            <div class="mini-customer">Lily · 旺财</div>
                        </div>
                        <span class="mini-status confirmed">已确认</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
