<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的排班 - 技师端</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F97316;
            --secondary: #FED7AA;
            --cta: #8B5CF6;
            --bg: #FFF7ED;
            --text: #7C2D12;
            --text-light: #C2410C;
            --white: #FFFFFF;
            --gray-100: #FFEDD5;
            --gray-200: #FED7AA;
            --gray-500: #EA580C;
            --green: #10B981;
            --orange: #F59E0B;
            --red: #EF4444;
            --shadow: 0 4px 20px rgba(249, 115, 22, 0.15);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Nunito Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
            max-width: 375px;
            margin: 0 auto;
            position: relative;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--cta) 100%);
            padding: 50px 20px 80px;
        }
        
        .header-title {
            font-family: 'Varela Round', sans-serif;
            font-size: 22px;
            color: var(--white);
            text-align: center;
        }
        
        .month-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
        }
        
        .month-selector button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: var(--white);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
        }
        
        .month-selector span {
            color: var(--white);
            font-size: 16px;
            font-weight: 600;
        }
        
        .content {
            margin-top: -50px;
            padding: 0 16px;
        }
        
        .calendar-card {
            background: var(--white);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 12px;
        }
        
        .weekday {
            font-size: 13px;
            color: #9CA3AF;
            padding: 8px 0;
        }
        
        .weekday.weekend {
            color: var(--red);
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        
        .day-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
        }
        
        .day-cell .day-num {
            font-size: 14px;
            font-weight: 500;
        }
        
        .day-cell .work-indicator {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            margin-top: 4px;
        }
        
        .day-cell.work .work-indicator {
            background: var(--green);
        }
        
        .day-cell.off .work-indicator {
            background: var(--gray-200);
        }
        
        .day-cell.today {
            background: var(--primary);
            color: var(--white);
        }
        
        .day-cell.selected {
            background: var(--gray-100);
            border: 2px solid var(--primary);
        }
        
        .day-cell.other-month {
            color: #D1D5DB;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #F3F4F6;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #6B7280;
        }
        
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .legend-dot.work {
            background: var(--green);
        }
        
        .legend-dot.off {
            background: var(--gray-200);
        }
        
        .schedule-section {
            margin-top: 24px;
        }
        
        .section-title {
            font-family: 'Varela Round', sans-serif;
            font-size: 17px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .schedule-card {
            background: var(--white);
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow);
        }
        
        .schedule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #F3F4F6;
        }
        
        .schedule-date {
            font-size: 16px;
            font-weight: 600;
        }
        
        .schedule-status {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 500;
        }
        
        .schedule-status.work {
            background: #D1FAE5;
            color: #059669;
        }
        
        .schedule-status.off {
            background: #F3F4F6;
            color: #6B7280;
        }
        
        .time-slots {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .time-slot {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #F9FAFB;
            border-radius: 10px;
        }
        
        .time-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            min-width: 70px;
        }
        
        .time-status {
            flex: 1;
            font-size: 13px;
        }
        
        .time-status.booked {
            color: var(--primary);
        }
        
        .time-status.available {
            color: #6B7280;
        }
        
        .slot-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .slot-indicator.booked {
            background: var(--primary);
        }
        
        .slot-indicator.available {
            background: var(--gray-200);
        }
        
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
            max-width: 375px;
            margin: 0 auto;
        }
        
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #9CA3AF;
            font-size: 10px;
            cursor: pointer;
        }
        
        .tab-item.active {
            color: var(--primary);
        }
        
        .tab-item .icon {
            font-size: 22px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="header-title">📅 我的排班</h1>
        <div class="month-selector">
            <button>‹</button>
            <span>2024年2月</span>
            <button>›</button>
        </div>
    </div>
    
    <div class="content">
        <div class="calendar-card">
            <div class="weekdays">
                <div class="weekday">日</div>
                <div class="weekday">一</div>
                <div class="weekday">二</div>
                <div class="weekday">三</div>
                <div class="weekday">四</div>
                <div class="weekday">五</div>
                <div class="weekday weekend">六</div>
            </div>
            <div class="calendar-grid">
                <div class="day-cell other-month"><span class="day-num">28</span></div>
                <div class="day-cell other-month"><span class="day-num">29</span></div>
                <div class="day-cell other-month"><span class="day-num">30</span></div>
                <div class="day-cell other-month"><span class="day-num">31</span></div>
                <div class="day-cell work"><span class="day-num">1</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">2</span><span class="work-indicator"></span></div>
                <div class="day-cell off"><span class="day-num">3</span><span class="work-indicator"></span></div>
                <div class="day-cell off"><span class="day-num">4</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">5</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">6</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">7</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">8</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">9</span><span class="work-indicator"></span></div>
                <div class="day-cell off"><span class="day-num">10</span><span class="work-indicator"></span></div>
                <div class="day-cell off"><span class="day-num">11</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">12</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">13</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">14</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">15</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">16</span><span class="work-indicator"></span></div>
                <div class="day-cell off"><span class="day-num">17</span><span class="work-indicator"></span></div>
                <div class="day-cell off"><span class="day-num">18</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">19</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">20</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">21</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">22</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">23</span><span class="work-indicator"></span></div>
                <div class="day-cell off"><span class="day-num">24</span><span class="work-indicator"></span></div>
                <div class="day-cell off"><span class="day-num">25</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">26</span><span class="work-indicator"></span></div>
                <div class="day-cell today selected"><span class="day-num">27</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">28</span><span class="work-indicator"></span></div>
                <div class="day-cell work"><span class="day-num">29</span><span class="work-indicator"></span></div>
            </div>
            <div class="legend">
                <div class="legend-item">
                    <span class="legend-dot work"></span>
                    <span>上班</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot off"></span>
                    <span>休息</span>
                </div>
            </div>
        </div>
        
        <div class="schedule-section">
            <h3 class="section-title">📋 2月27日排班详情</h3>
            <div class="schedule-card">
                <div class="schedule-header">
                    <span class="schedule-date">⏰ 工作时间</span>
                    <span class="schedule-status work">上班</span>
                </div>
                <div class="time-slots">
                    <div class="time-slot">
                        <span class="time-label">09:00</span>
                        <span class="time-status booked">已预约 - 猫咪洗护</span>
                        <span class="slot-indicator booked"></span>
                    </div>
                    <div class="time-slot">
                        <span class="time-label">10:00</span>
                        <span class="time-status booked">已预约 - 狗狗洗护</span>
                        <span class="slot-indicator booked"></span>
                    </div>
                    <div class="time-slot">
                        <span class="time-label">11:00</span>
                        <span class="time-status available">可预约</span>
                        <span class="slot-indicator available"></span>
                    </div>
                    <div class="time-slot">
                        <span class="time-label">14:00</span>
                        <span class="time-status booked">已预约 - 美容造型</span>
                        <span class="slot-indicator booked"></span>
                    </div>
                    <div class="time-slot">
                        <span class="time-label">15:00</span>
                        <span class="time-status available">可预约</span>
                        <span class="slot-indicator available"></span>
                    </div>
                    <div class="time-slot">
                        <span class="time-label">16:00</span>
                        <span class="time-status booked">已预约 - 狗狗洗护</span>
                        <span class="slot-indicator booked"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="tab-bar">
        <div class="tab-item">
            <span class="icon">📋</span>
            <span>预约</span>
        </div>
        <div class="tab-item active">
            <span class="icon">📅</span>
            <span>排班</span>
        </div>
        <div class="tab-item">
            <span class="icon">👤</span>
            <span>我的</span>
        </div>
    </div>
</body>
</html>
