<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>PawsUp 爪哇宠屋 - 管理仪表盘</title>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-left">
                <span class="logo-icon">🐾</span>
                <h1>PawsUp 爪哇宠屋</h1>
            </div>
            <div class="header-right">
                <span class="admin-badge">管理员</span>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </header>
        
        <div class="dashboard-layout">
            <nav class="sidebar">
                <ul class="nav-menu">
                    <li><a href="dashboard">📊 仪表盘</a></li>
                    <li><a href="admin-appointments">📋 预约管理</a></li>
                    <li><a href="orders">📦 订单管理</a></li>
                    <li><a href="services">🛁 服务管理</a></li>
                    <li><a href="boarding-rooms">🏠 房型管理</a></li>
                    <li><a href="groomers">👨‍🔧 美容师管理</a></li>
                    <li><a href="admin-schedule">📅 排班管理</a></li>
                    <li><a href="banner">🖼️ Banner管理</a></li>
                    <li><a href="membership-levels">💎 会员档位</a></li>
                    <li><a href="coupons">🎫 优惠券</a></li>
                    <li><a href="statistics">📈 数据统计</a></li>
                </ul>
            </nav>
            
            <main class="main-content">
                <div class="page-header">
                    <h2>欢迎回来，<span id="adminName">管理员</span></h2>
                    <p class="subtitle">今天是 <span id="currentDate"></span></p>
                </div>
                
                <div class="stats-cards-row">
                    <div class="stat-card-large clickable" onclick="location.href='orders'">
                        <div class="stat-icon">📦</div>
                        <div class="stat-info">
                            <span class="stat-label">今日订单</span>
                            <span class="stat-value" id="todayOrders">0</span>
                        </div>
                    </div>
                    <div class="stat-card-large clickable" onclick="location.href='orders?status=pending'">
                        <div class="stat-icon">⏰</div>
                        <div class="stat-info">
                            <span class="stat-label">待处理</span>
                            <span class="stat-value" id="pendingOrders">0</span>
                        </div>
                    </div>
                    <div class="stat-card-large clickable" onclick="location.href='statistics'">
                        <div class="stat-icon">💰</div>
                        <div class="stat-info">
                            <span class="stat-label">今日收入</span>
                            <span class="stat-value" id="todayRevenue">¥0.00</span>
                        </div>
                    </div>
                    <div class="stat-card-large clickable" onclick="location.href='groomers'">
                        <div class="stat-icon">👨‍🔧</div>
                        <div class="stat-info">
                            <span class="stat-label">在职美容师</span>
                            <span class="stat-value" id="activeTechs">0</span>
                        </div>
                    </div>
                </div>
                
                <div class="dashboard-grid">
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h3>📋 最近订单</h3>
                            <a href="orders" class="view-all">查看全部</a>
                        </div>
                        <div class="recent-list" id="recentOrders"></div>
                    </div>
                    
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h3>🛁 热门服务</h3>
                            <a href="services" class="view-all">管理</a>
                        </div>
                        <div class="service-rank" id="topServices"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    

    <script src="https://res.wx.qq.com/open/js/cloudbase/1.1.0/cloud.js"></script>
    <script src="js/app.js?v=4"></script>
    <script src="js/dashboard.js?v=4"></script>
    
    <!-- 直接内嵌订单加载逻辑，不依赖外部JS -->
    <script>
        console.log('=== 内嵌订单加载脚本执行 ===');
        
        // 直接加载并显示订单
        async function loadOrdersDirectly() {
            console.log('开始直接加载订单...');
            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'list'})
                });
                
                console.log('订单API响应状态:', response.status);
                const result = await response.json();
                console.log('订单API返回:', result);
                
                if (!result.data || result.data.length === 0) {
                    console.log('没有订单数据');
                    return;
                }
                
                console.log('订单数量:', result.data.length);
                
                // 渲染订单列表
                const container = document.getElementById('recentOrders');
                if (!container) {
                    console.error('找不到 recentOrders 容器');
                    return;
                }
                
                container.innerHTML = result.data.map(order => {
                    const orderData = order.data || order;
                    
                    // 获取金额 - 使用正确的字段名
                    let amount = parseFloat(orderData.finalPrice) || parseFloat(orderData.totalPrice) || parseFloat(orderData.servicePrice) || 0;
                    
                    // 获取客户名
                    let customerName = orderData.petName || orderData.customerName || '未知客户';
                    
                    // 获取服务名
                    let serviceName = orderData.serviceName || '未知服务';
                    
                    // 获取状态
                    const status = orderData.status || 'pending';
                    const statusText = {
                        'pending': '待处理',
                        'confirmed': '已确认',
                        'completed': '已完成',
                        'cancelled': '已取消'
                    }[status] || status;
                    
                    return `
                    <div class="recent-item">
                        <div class="item-info">
                            <span class="item-title">${customerName}</span>
                            <span class="item-subtitle">${serviceName}</span>
                        </div>
                        <div class="item-meta">
                            <span class="item-amount">¥${amount.toFixed(2)}</span>
                            <span class="status-badge ${status}">${statusText}</span>
                        </div>
                    </div>
                `}).join('');
                
                console.log('订单列表渲染完成');
                
            } catch (err) {
                console.error('加载订单失败:', err);
            }
        }
        
        // 页面加载完成后立即执行
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadOrdersDirectly);
        } else {
            loadOrdersDirectly();
        }
    </script>
</body>
</html>
