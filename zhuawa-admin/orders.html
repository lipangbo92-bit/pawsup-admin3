<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawsUp 爪哇宠屋 - 订单管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-left">
                <span class="logo-icon">🐾</span>
                <h1>PawsUp 爪哇宠屋</h1>
            </div>
            <div class="header-right">
                <span class="admin-badge">管理员</span>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </header>
        
        <div class="dashboard-layout">
            <nav class="sidebar">
                <ul class="nav-menu">
                    <li><a href="dashboard.html">📊 仪表盘</a></li>
                    <li class="active"><a href="orders.html">📋 订单管理</a></li>
                    <li><a href="services.html">🛁 服务管理</a></li>
                    <li><a href="technicians.html">👨‍🔧 技师管理</a></li>
                    <li><a href="statistics.html">📈 数据统计</a></li>
                </ul>
            </nav>
            
            <main class="main-content">
                <div class="page-header">
                    <h2>订单管理</h2>
                    <div class="filter-bar">
                        <select id="statusFilter" onchange="filterOrders()">
                            <option value="">全部状态</option>
                            <option value="pending">待处理</option>
                            <option value="confirmed">已确认</option>
                            <option value="in_service">服务中</option>
                            <option value="completed">已完成</option>
                            <option value="cancelled">已取消</option>
                        </select>
                        <input type="date" id="dateFilter" onchange="filterOrders()">
                        <input type="text" id="searchInput" placeholder="搜索订单号/客户/电话" onkeyup="searchOrders()">
                    </div>
                </div>
                
                <div class="data-table-container">
                    <table class="data-table" id="ordersTable">
                        <thead>
                            <tr>
                                <th>订单号</th>
                                <th>客户信息</th>
                                <th>服务类型</th>
                                <th>预约时间</th>
                                <th>金额</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody">
                        </tbody>
                    </table>
                </div>
                
                <div class="pagination" id="pagination"></div>
            </main>
        </div>
    </div>
    
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>订单详情</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="orderDetailContent"></div>
            <div class="modal-footer" id="orderModalFooter"></div>
        </div>
    </div>
    
    <script src="https://res.wx.qq.com/open/js/cloudbase/1.1.0/cloud.js"></script>
    <script src="js/app.js"></script>
    <script src="js/orders.js"></script>
</body>
</html>
