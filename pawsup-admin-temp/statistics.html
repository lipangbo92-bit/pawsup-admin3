<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawsUp 爪哇宠屋 - 数据统计</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-left">
                <span class="logo-icon">🐾</span>
                <h1>PawsUp 爪哇宠屋</h1>
            </div>
            <div class="header-right">
                <span class="admin-badge">管理员</span>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </header>
        
        <div class="dashboard-layout">
            <nav class="sidebar">
                <ul class="nav-menu">
                    <li><a href="dashboard.html">📊 仪表盘</a></li>
                    <li><a href="orders.html">📋 订单管理</a></li>
                    <li><a href="services.html">🛁 服务管理</a></li>
                    <li><a href="technicians.html">👨‍🔧 技师管理</a></li>
                    <li class="active"><a href="statistics.html">📈 数据统计</a></li>
                </ul>
            </nav>
            
            <main class="main-content">
                <div class="page-header">
                    <h2>数据统计</h2>
                    <div class="date-range-picker">
                        <input type="date" id="startDate" onchange="loadStatistics()">
                        <span>至</span>
                        <input type="date" id="endDate" onchange="loadStatistics()">
                        <button class="btn-secondary" onclick="setDateRange('week')">本周</button>
                        <button class="btn-secondary" onclick="setDateRange('month')">本月</button>
                    </div>
                </div>
                
                <div class="stats-cards-row">
                    <div class="stat-card-large">
                        <div class="stat-icon">💰</div>
                        <div class="stat-info">
                            <span class="stat-label">总收入</span>
                            <span class="stat-value" id="totalRevenue">¥0.00</span>
                            <span class="stat-change" id="revenueChange">--</span>
                        </div>
                    </div>
                    <div class="stat-card-large">
                        <div class="stat-icon">📦</div>
                        <div class="stat-info">
                            <span class="stat-label">订单总数</span>
                            <span class="stat-value" id="totalOrders">0</span>
                            <span class="stat-change" id="ordersChange">--</span>
                        </div>
                    </div>
                    <div class="stat-card-large">
                        <div class="stat-icon">👥</div>
                        <div class="stat-info">
                            <span class="stat-label">新增客户</span>
                            <span class="stat-value" id="newCustomers">0</span>
                            <span class="stat-change" id="customersChange">--</span>
                        </div>
                    </div>
                    <div class="stat-card-large">
                        <div class="stat-icon">⭐</div>
                        <div class="stat-info">
                            <span class="stat-label">平均评分</span>
                            <span class="stat-value" id="avgRating">0.0</span>
                            <span class="stat-change" id="ratingChange">--</span>
                        </div>
                    </div>
                </div>
                
                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>收入趋势</h3>
                        <canvas id="revenueChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3>服务类型分布</h3>
                        <canvas id="serviceChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3>订单状态分布</h3>
                        <canvas id="statusChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3>技师业绩排行</h3>
                        <canvas id="technicianChart"></canvas>
                    </div>
                </div>
                
                <div class="data-section">
                    <h3>每日明细</h3>
                    <div class="data-table-container">
                        <table class="data-table" id="dailyStatsTable">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>订单数</th>
                                    <th>收入</th>
                                    <th>客单价</th>
                                    <th>取消率</th>
                                </tr>
                            </thead>
                            <tbody id="dailyStatsBody"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="https://res.wx.qq.com/open/js/cloudbase/1.1.0/cloud.js"></script>
    <script src="js/app.js"></script>
    <script src="js/statistics.js"></script>
</body>
</html>
