<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawsUp 爪哇宠屋 - 服务管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-left">
                <span class="logo-icon">🐾</span>
                <h1>PawsUp 爪哇宠屋</h1>
            </div>
            <div class="header-right">
                <span class="admin-badge">管理员</span>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </header>
        
        <div class="dashboard-layout">
            <nav class="sidebar">
                <ul class="nav-menu">
                    <li><a href="dashboard.html">📊 仪表盘</a></li>
                    <li><a href="orders.html">📋 订单管理</a></li>
                    <li class="active"><a href="services.html">🛁 服务管理</a></li>
                    <li><a href="technicians.html">👨‍🔧 技师管理</a></li>
                    <li><a href="statistics.html">📈 数据统计</a></li>
                </ul>
            </nav>
            
            <main class="main-content">
                <div class="page-header">
                    <h2>服务管理</h2>
                    <button class="btn-primary" onclick="openServiceModal()">+ 添加服务</button>
                </div>
                
                <div class="services-grid" id="servicesGrid"></div>
            </main>
        </div>
    </div>
    
    <!-- 添加/编辑服务模态框 -->
    <div class="modal" id="serviceModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="serviceModalTitle">添加服务</h3>
                <button class="close-btn" onclick="closeServiceModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="serviceForm">
                    <input type="hidden" id="serviceId">
                    <div class="form-group">
                        <label>服务名称 *</label>
                        <input type="text" id="serviceName" required placeholder="如：基础洗护">
                    </div>
                    <div class="form-group">
                        <label>价格 (元) *</label>
                        <input type="number" id="servicePrice" required min="0" step="0.01" placeholder="99.00">
                    </div>
                    <div class="form-group">
                        <label>服务分类 *</label>
                        <select id="serviceCategory" required>
                            <option value="">请选择分类</option>
                            <option value="bath">洗护美容</option>
                            <option value="grooming">美容造型</option>
                            <option value="spa">SPA护理</option>
                            <option value="medical">医疗护理</option>
                            <option value="boarding">寄养服务</option>
                            <option value="other">其他服务</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>服务描述</label>
                        <textarea id="serviceDesc" rows="4" placeholder="服务详情描述..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeServiceModal()">取消</button>
                <button class="btn-primary" onclick="saveService()">保存</button>
            </div>
        </div>
    </div>
    
    <script src="https://res.wx.qq.com/open/js/cloudbase/1.1.0/cloud.js"></script>
    <script src="js/app.js"></script>
    <script src="js/services.js"></script>
</body>
</html>
