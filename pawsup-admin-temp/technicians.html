<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawsUp 爪哇宠屋 - 技师管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-left">
                <span class="logo-icon">🐾</span>
                <h1>PawsUp 爪哇宠屋</h1>
            </div>
            <div class="header-right">
                <span class="admin-badge">管理员</span>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </header>
        
        <div class="dashboard-layout">
            <nav class="sidebar">
                <ul class="nav-menu">
                    <li><a href="dashboard.html">📊 仪表盘</a></li>
                    <li><a href="orders.html">📋 订单管理</a></li>
                    <li><a href="services.html">🛁 服务管理</a></li>
                    <li class="active"><a href="technicians.html">👨‍🔧 技师管理</a></li>
                    <li><a href="statistics.html">📈 数据统计</a></li>
                </ul>
            </nav>
            
            <main class="main-content">
                <div class="page-header">
                    <h2>技师管理</h2>
                    <button class="btn-primary" onclick="openTechnicianModal()">+ 添加技师</button>
                </div>
                
                <div class="technicians-grid" id="techniciansGrid"></div>
            </main>
        </div>
    </div>
    
    <!-- 添加/编辑技师模态框 -->
    <div class="modal" id="technicianModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="technicianModalTitle">添加技师</h3>
                <button class="close-btn" onclick="closeTechnicianModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="technicianForm">
                    <input type="hidden" id="technicianId">
                    <div class="form-group avatar-group">
                        <label>头像 (可选)</label>
                        <div class="avatar-upload" id="avatarUpload">
                            <input type="file" id="avatarInput" accept="image/*" onchange="previewAvatar(this)">
                            <div class="avatar-preview" id="avatarPreview">
                                <span>👤</span>
                            </div>
                            <span class="upload-hint">点击上传头像</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>技师姓名 *</label>
                        <input type="text" id="techName" required placeholder="技师姓名">
                    </div>
                    <div class="form-group">
                        <label>专业 *</label>
                        <input type="text" id="techSpecialty" required placeholder="如：洗护美容、SPA护理">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>评级 (1-5星) *</label>
                            <select id="techRating" required>
                                <option value="">请选择评级</option>
                                <option value="5">⭐⭐⭐⭐⭐ (5星)</option>
                                <option value="4">⭐⭐⭐⭐ (4星)</option>
                                <option value="3">⭐⭐⭐ (3星)</option>
                                <option value="2">⭐⭐ (2星)</option>
                                <option value="1">⭐ (1星)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>订单数 *</label>
                            <input type="number" id="techOrderCount" required min="0" placeholder="0">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeTechnicianModal()">取消</button>
                <button class="btn-primary" onclick="saveTechnician()">保存</button>
            </div>
        </div>
    </div>
    
    <script src="https://res.wx.qq.com/open/js/cloudbase/1.1.0/cloud.js"></script>
    <script src="js/app.js"></script>
    <script src="js/technicians.js"></script>
</body>
</html>
