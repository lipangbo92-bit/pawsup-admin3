<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>技师管理 - 管理端</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F97316;
            --secondary: #FED7AA;
            --cta: #8B5CF6;
            --bg: #FFF7ED;
            --text: #7C2D12;
            --text-light: #C2410C;
            --white: #FFFFFF;
            --gray-100: #FFEDD5;
            --gray-200: #FED7AA;
            --gray-500: #EA580C;
            --green: #10B981;
            --orange: #F59E0B;
            --red: #EF4444;
            --shadow: 0 4px 20px rgba(249, 115, 22, 0.15);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Nunito Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 220px;
            background: var(--white);
            padding: 24px 0;
            box-shadow: 2px 0 20px rgba(0,0,0,0.05);
            z-index: 100;
        }
        
        .logo-section {
            padding: 0 20px 24px;
            border-bottom: 1px solid var(--gray-100);
            margin-bottom: 16px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Varela Round', sans-serif;
            font-size: 20px;
            color: var(--primary);
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: #6B7280;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            text-decoration: none;
        }
        
        .nav-item:hover, .nav-item.active {
            background: var(--gray-100);
            color: var(--primary);
            border-left-color: var(--primary);
        }
        
        .nav-item .icon { font-size: 18px; }
        
        .main-content {
            margin-left: 220px;
            padding: 24px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .page-title {
            font-family: 'Varela Round', sans-serif;
            font-size: 24px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--cta) 100%);
            color: var(--white);
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-box {
            background: var(--white);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        
        .stat-box-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-box-label {
            font-size: 13px;
            color: #6B7280;
            margin-top: 4px;
        }
        
        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .tech-card {
            background: var(--white);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            position: relative;
        }

        .tech-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(249, 115, 22, 0.2);
        }

        .technician-card.inactive {
            opacity: 0.7;
            background: #F9FAFB;
        }

        .technician-card.inactive .tech-avatar {
            filter: grayscale(0.5);
        }
        
        .tech-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }
        
        .tech-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--white);
        }
        
        .tech-info {
            flex: 1;
        }
        
        .tech-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .tech-level {
            display: inline-block;
            background: var(--gray-100);
            color: var(--text-light);
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 10px;
        }
        
        .tech-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .tech-status.active {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
        }
        
        .tech-status.inactive {
            background: #9CA3AF;
        }
        
        .tech-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 12px 0;
            border-top: 1px solid #F3F4F6;
            border-bottom: 1px solid #F3F4F6;
            margin-bottom: 12px;
        }
        
        .tech-stat {
            text-align: center;
        }
        
        .tech-stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }
        
        .tech-stat-label {
            font-size: 11px;
            color: #6B7280;
        }
        
        .tech-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
        }
        
        .stars {
            color: #F59E0B;
            font-size: 14px;
        }
        
        .rating-text {
            font-size: 13px;
            color: #6B7280;
        }
        
        .tech-actions {
            display: flex;
            gap: 8px;
        }
        
        .tech-actions button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-edit {
            background: var(--gray-100);
            color: var(--text);
        }
        
        .btn-edit:hover {
            background: var(--gray-200);
        }
        
        .btn-schedule {
            background: var(--primary);
            color: var(--white);
        }
        
        .btn-schedule:hover {
            background: #EA580C;
        }
        
        .btn-toggle {
            background: #FEE2E2;
            color: var(--red);
        }
        
        .btn-toggle.active {
            background: #D1FAE5;
            color: #059669;
        }

        /* 状态徽章 */
        .status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge.active {
            background: var(--green-light);
            color: var(--green);
        }

        .status-badge.inactive {
            background: var(--gray-200);
            color: #6B7280;
        }

        /* 按钮样式 */
        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
            background: var(--gray-100);
        }

        .btn-icon:hover {
            background: var(--gray-200);
            transform: scale(1.1);
        }

        .btn-icon.warning {
            background: var(--red-light);
            color: var(--red);
        }

        .btn-icon.warning:hover {
            background: var(--red);
            color: white;
        }

        .btn-icon.danger {
            background: #FEE2E2;
            color: #EF4444;
        }

        .btn-icon.danger:hover {
            background: #EF4444;
            color: white;
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .modal.show {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        
        .modal.show .modal-content {
            transform: scale(1);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #eee;
        }
        
        .modal-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            line-height: 1;
        }
        
        .modal-close:hover {
            color: #333;
        }
        
        .modal-body {
            padding: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .avatar-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .avatar-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
        }
        
        .avatar-option:hover {
            transform: scale(1.1);
        }
        
        .avatar-option.selected {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.3);
        }
        
        .tags-input {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            min-height: 46px;
        }
        
        .tags-input:focus-within {
            border-color: var(--primary);
        }
        
        .tags-input input {
            border: none;
            flex: 1;
            min-width: 100px;
            padding: 4px 8px;
        }
        
        .tags-input input:focus {
            outline: none;
        }
        
        .tag {
            background: var(--gray-100);
            color: var(--text);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .tag-remove {
            cursor: pointer;
            color: #999;
        }
        
        .modal-footer {
            display: flex;
            gap: 12px;
            padding: 16px 24px;
            border-top: 1px solid #eee;
        }
        
        .btn-cancel, .btn-save, .btn-danger {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        .btn-cancel {
            background: #F3F4F6;
            color: #6B7280;
        }
        
        .btn-cancel:hover {
            background: #E5E7EB;
        }
        
        .btn-save {
            background: linear-gradient(135deg, var(--primary) 0%, var(--cta) 100%);
            color: white;
        }
        
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }
        
        .btn-danger {
            background: #FEE2E2;
            color: var(--red);
        }
        
        .btn-danger:hover {
            background: #FECACA;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9CA3AF;
        }
        
        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 16px;
        }
        
        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 16px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-section">
            <div class="logo">
                <span>🐾</span>
                <span>爪哇后台管理</span>
            </div>
        </div>
        <nav>
            <a href="dashboard.html" class="nav-item">
                <span class="icon">📊</span>
                <span>仪表盘</span>
            </a>
            <a href="orders.html" class="nav-item">
                <span class="icon">📋</span>
                <span>预约管理</span>
            </a>
            <a href="technicians.html" class="nav-item active">
                <span class="icon">👥</span>
                <span>技师管理</span>
            </a>
            <a href="schedule.html" class="nav-item">
                <span class="icon">📅</span>
                <span>排班管理</span>
            </a>
            <a href="services.html" class="nav-item">
                <span class="icon">✂️</span>
                <span>服务管理</span>
            </a>
            <a href="statistics.html" class="nav-item">
                <span class="icon">📈</span>
                <span>数据统计</span>
            </a>
        </nav>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h1 class="page-title">👥 技师管理</h1>
            <button class="btn-primary" onclick="openModal()">
                <span>+</span>
                <span>添加技师</span>
            </button>
        </div>
        
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-box-value" id="statTotal">0</div>
                <div class="stat-box-label">总技师</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-value" id="statActive">0</div>
                <div class="stat-box-label">在职</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-value" id="statInactive">0</div>
                <div class="stat-box-label">休息中</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-value" id="statAvgRating">0.0</div>
                <div class="stat-box-label">平均评分</div>
            </div>
        </div>
        
        <div class="tech-grid" id="techGrid">
            <!-- Technicians will be rendered here -->
        </div>
    </div>
    
    <!-- Technician Modal -->
    <div id="techModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">添加技师</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="techId">
                <div class="form-group">
                    <label>选择头像</label>
                    <div class="avatar-selector" id="avatarSelector">
                        <div class="avatar-option selected" data-avatar="👩‍🦱">👩‍🦱</div>
                        <div class="avatar-option" data-avatar="👨‍🦲">👨‍🦲</div>
                        <div class="avatar-option" data-avatar="👩">👩</div>
                        <div class="avatar-option" data-avatar="👨">👨</div>
                        <div class="avatar-option" data-avatar="👱‍♀️">👱‍♀️</div>
                        <div class="avatar-option" data-avatar="👱‍♂️">👱‍♂️</div>
                        <div class="avatar-option" data-avatar="👩‍🦰">👩‍🦰</div>
                        <div class="avatar-option" data-avatar="👨‍🦱">👨‍🦱</div>
                    </div>
                    <input type="hidden" id="techAvatar" value="👩‍🦱">
                </div>
                <div class="form-group">
                    <label>姓名 *</label>
                    <input type="text" id="techName" placeholder="技师姓名">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>级别 *</label>
                        <select id="techLevel">
                            <option value="首席美容师">首席美容师</option>
                            <option value="高级美容师">高级美容师</option>
                            <option value="资深美容师">资深美容师</option>
                            <option value="中级美容师" selected>中级美容师</option>
                            <option value="初级美容师">初级美容师</option>
                            <option value="实习美容师">实习美容师</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>评分 (0-5)</label>
                        <input type="number" id="techRating" value="5.0" step="0.1" min="0" max="5">
                    </div>
                </div>
                <div class="form-group">
                    <label>擅长技能标签</label>
                    <div class="tags-input" id="tagsInput">
                        <input type="text" id="tagInput" placeholder="输入标签后按回车">
                    </div>
                </div>
                <div class="form-group">
                    <label>个人简介</label>
                    <textarea id="techBio" placeholder="请输入技师简介..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>服务单数</label>
                        <input type="number" id="techOrders" value="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>评价数量</label>
                        <input type="number" id="techReviews" value="0" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="techStatus">
                        <option value="active">在职</option>
                        <option value="inactive">休息中</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-save" onclick="console.log('Save button clicked'); saveTech().catch(e => { console.error('Save error:', e); alert('保存出错: ' + e.message); });">保存</button>
            </div>
        </div>
    </div>
    
    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3>确认删除</h3>
                <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="text-align: center; color: #666;">确定要删除技师 <strong id="deleteTechName"></strong> 吗？<br>此操作不可撤销。</p>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeDeleteModal()">取消</button>
                <button class="btn-danger" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>

    <!-- Cloudbase Web SDK -->
    <script src="https://res.wx.qq.com/open/js/cloudbase/1.1.0/cloud.js"></script>
    <script>
        // Global error handler
        window.onerror = function(msg, url, line, col, error) {
            console.error('Global error:', msg, 'at', line, error);
            alert('页面错误: ' + msg + ' (行' + line + ')');
            return false;
        };
        
        // Avatar options
        const avatarOptions = ['👩‍🦱', '👨‍🦲', '👩', '👨', '👱‍♀️', '👱‍♂️', '👩‍🦰', '👨‍🦱'];
        let selectedTags = [];
        let deleteTargetId = null;
        
        // Cloudbase configuration
        const CLOUD_ENV_ID = 'cloud1-4gy1jyan842d73ab';
        let db = null;
        let technicians = [];
        
        // Initialize Cloudbase
        async function initCloudbase() {
            try {
                console.log('Initializing Cloudbase...');
                console.log('cloud object:', typeof cloud);
                
                if (typeof cloud === 'undefined') {
                    throw new Error('cloud SDK not loaded - check script tag');
                }
                
                cloud.init({
                    env: CLOUD_ENV_ID,
                    traceUser: true
                });
                console.log('cloud.init() called');
                
                db = cloud.database();
                console.log('db initialized');
                
                // Anonymous login
                const auth = cloud.auth();
                console.log('auth object:', typeof auth);
                await auth.anonymousAuthProvider().signIn();
                console.log('Anonymous login success');
                
                await loadTechnicians();
                console.log('Technicians loaded, count:', technicians.length);
            } catch (error) {
                console.error('Cloudbase init error:', error);
                document.getElementById('techGrid').innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:60px;color:#EF4444;">
                        <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
                        <div>云服务初始化失败</div>
                        <div style="font-size:14px;margin-top:8px;color:#666;">${error.message}</div>
                        <button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#F97316;color:white;border:none;border-radius:8px;cursor:pointer;">刷新重试</button>
                    </div>
                `;
            }
        }
        
        // Show/hide loading
        function showLoading(show) {
            // Create overlay if not exists
            let overlay = document.getElementById('loadingOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.style.cssText = 'display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.9);z-index:1000;justify-content:center;align-items:center;flex-direction:column;';
                overlay.innerHTML = '<div style="font-size:48px;margin-bottom:16px;">🐾</div><div style="color:#666;">加载中...</div>';
                document.body.appendChild(overlay);
            }
            overlay.style.display = show ? 'flex' : 'none';
        }
        
        // Load technicians from cloud database
        async function loadTechnicians() {
            try {
                const result = await db.collection('technicians').get();
                // Map _id to id for consistency
                technicians = (result.data || []).map(t => ({...t, id: t._id}));
                
                // If no data, add default technicians
                if (technicians.length === 0) {
                    const defaultTechnicians = [
                        {
                            avatar: '👩‍🦱',
                            name: '小美',
                            level: '高级美容师',
                            tags: ['美容', 'SPA', '造型'],
                            bio: '8年宠物美容经验，擅长泰迪造型、比熊修剪',
                            rating: 4.9,
                            orders: 328,
                            todayOrders: 5,
                            monthlyRevenue: 52000,
                            reviews: 128,
                            status: 'active',
                            createTime: new Date()
                        },
                        {
                            avatar: '👨‍🦲',
                            name: 'Tony',
                            level: '中级美容师',
                            tags: ['洗澡', '护理', '大型犬'],
                            bio: '专注大型犬洗护，手法温和专业',
                            rating: 4.8,
                            orders: 215,
                            todayOrders: 4,
                            monthlyRevenue: 38000,
                            reviews: 96,
                            status: 'active',
                            createTime: new Date()
                        },
                        {
                            avatar: '👩',
                            name: 'Lily',
                            level: '资深美容师',
                            tags: ['猫咪', '精细修剪', '染色'],
                            bio: '猫咪专属美容师，擅长各种猫种的专业护理',
                            rating: 4.7,
                            orders: 156,
                            todayOrders: 3,
                            monthlyRevenue: 28000,
                            reviews: 68,
                            status: 'active',
                            createTime: new Date()
                        },
                        {
                            avatar: '👨',
                            name: '阿强',
                            level: '初级美容师',
                            tags: ['基础洗护', '助理'],
                            bio: '新进美容师，认真负责，学习能力强',
                            rating: 4.9,
                            orders: 89,
                            todayOrders: 2,
                            monthlyRevenue: 15000,
                            reviews: 42,
                            status: 'active',
                            createTime: new Date()
                        }
                    ];
                    
                    for (const tech of defaultTechnicians) {
                        await db.collection('technicians').add({ data: tech });
                    }
                    // Reload to get the generated _id
                    const reloadResult = await db.collection('technicians').get();
                    technicians = (reloadResult.data || []).map(t => ({...t, id: t._id}));
                }
                
                renderTechnicians();
            } catch (error) {
                console.error('Load technicians error:', error);
                alert('加载技师数据失败');
            }
        }
        
        // Update stats
        function updateStats() {
            const total = technicians.length;
            const active = technicians.filter(t => t.status === 'active').length;
            const inactive = total - active;
            const avgRating = total > 0 
                ? (technicians.reduce((sum, t) => sum + t.rating, 0) / total).toFixed(1)
                : '0.0';
            
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statActive').textContent = active;
            document.getElementById('statInactive').textContent = inactive;
            document.getElementById('statAvgRating').textContent = avgRating;
        }
        
        // Render technicians
        function renderTechnicians() {
            const grid = document.getElementById('techGrid');
            
            if (technicians.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">👤</div>
                        <div>暂无技师数据</div>
                        <div style="font-size: 14px; margin-top: 8px;">点击"添加技师"创建第一个技师</div>
                    </div>
                `;
                updateStats();
                return;
            }
            
            grid.innerHTML = technicians.map(tech => `
                <div class="tech-card" data-id="${tech.id}">
                    <div class="tech-header">
                        <div class="tech-avatar">${tech.avatar}</div>
                        <div class="tech-info">
                            <div class="tech-name">${tech.name}</div>
                            <span class="tech-level">${tech.level}</span>
                        </div>
                        <span class="tech-status ${tech.status}" title="${tech.status === 'active' ? '在职' : '休息中'}"></span>
                    </div>
                    <div class="tech-stats">
                        <div class="tech-stat">
                            <div class="tech-stat-value">${tech.orders}</div>
                            <div class="tech-stat-label">服务单</div>
                        </div>
                        <div class="tech-stat">
                            <div class="tech-stat-value">${tech.todayOrders || 0}</div>
                            <div class="tech-stat-label">今日</div>
                        </div>
                        <div class="tech-stat">
                            <div class="tech-stat-value">${formatRevenue(tech.monthlyRevenue || 0)}</div>
                            <div class="tech-stat-label">本月业绩</div>
                        </div>
                    </div>
                    <div class="tech-rating">
                        <span class="stars">${'⭐'.repeat(Math.floor(tech.rating))}</span>
                        <span class="rating-text">${tech.rating}分 (${tech.reviews}评价)</span>
                    </div>
                    <div style="margin-bottom: 12px;">
                        ${tech.tags.map(tag => `<span style="background: var(--gray-100); color: var(--text-light); padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-right: 6px;">${tag}</span>`).join('')}
                    </div>
                    <div class="tech-actions">
                        <button class="btn-edit" onclick="editTech('${tech.id}')">编辑</button>
                        <button class="btn-schedule" onclick="window.location.href='schedule.html?tech=${tech.id}'">排班</button>
                        <button class="btn-toggle ${tech.status === 'inactive' ? 'active' : ''}" onclick="toggleStatus('${tech.id}')">
                            ${tech.status === 'active' ? '休息' : '复工'}
                        </button>
                    </div>
                </div>
            `).join('');
            
            updateStats();
        }
        
        // Format revenue
        function formatRevenue(num) {
            if (num >= 10000) {
                return '¥' + (num / 10000).toFixed(1) + '万';
            }
            return '¥' + num;
        }
        
        // Modal functions
        function openModal(techId = null) {
            const modal = document.getElementById('techModal');
            const title = document.getElementById('modalTitle');
            
            // Reset tags
            selectedTags = [];
            renderTags();
            
            if (techId) {
                const tech = technicians.find(t => t.id === techId);
                if (!tech) return;
                
                title.textContent = '编辑技师';
                document.getElementById('techId').value = tech.id;
                document.getElementById('techName').value = tech.name;
                document.getElementById('techLevel').value = tech.level;
                document.getElementById('techRating').value = tech.rating;
                document.getElementById('techBio').value = tech.bio || '';
                document.getElementById('techOrders').value = tech.orders;
                document.getElementById('techReviews').value = tech.reviews;
                document.getElementById('techStatus').value = tech.status;
                
                // Set avatar
                document.getElementById('techAvatar').value = tech.avatar;
                updateAvatarSelection(tech.avatar);
                
                // Set tags
                selectedTags = [...(tech.tags || [])];
                renderTags();
            } else {
                title.textContent = '添加技师';
                document.getElementById('techId').value = '';
                document.getElementById('techName').value = '';
                document.getElementById('techLevel').value = '中级美容师';
                document.getElementById('techRating').value = 5.0;
                document.getElementById('techBio').value = '';
                document.getElementById('techOrders').value = 0;
                document.getElementById('techReviews').value = 0;
                document.getElementById('techStatus').value = 'active';
                
                document.getElementById('techAvatar').value = avatarOptions[0];
                updateAvatarSelection(avatarOptions[0]);
            }
            
            modal.classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('techModal').classList.remove('show');
        }
        
        // Avatar selection
        function updateAvatarSelection(avatar) {
            document.querySelectorAll('.avatar-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.avatar === avatar);
            });
        }
        
        document.querySelectorAll('.avatar-option').forEach(opt => {
            opt.addEventListener('click', function() {
                const avatar = this.dataset.avatar;
                document.getElementById('techAvatar').value = avatar;
                updateAvatarSelection(avatar);
            });
        });
        
        // Tags input
        const tagInput = document.getElementById('tagInput');
        const tagsContainer = document.getElementById('tagsInput');
        
        function renderTags() {
            const existingTags = tagsContainer.querySelectorAll('.tag');
            existingTags.forEach(t => t.remove());
            
            selectedTags.forEach((tag, index) => {
                const tagEl = document.createElement('div');
                tagEl.className = 'tag';
                tagEl.innerHTML = `${tag} <span class="tag-remove" onclick="removeTag(${index})">×</span>`;
                tagsContainer.insertBefore(tagEl, tagInput);
            });
        }
        
        function removeTag(index) {
            selectedTags.splice(index, 1);
            renderTags();
        }
        
        tagInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const value = this.value.trim();
                if (value && !selectedTags.includes(value)) {
                    selectedTags.push(value);
                    renderTags();
                    this.value = '';
                }
            }
        });
        
        // Save technician
        async function saveTech() {
            const id = document.getElementById('techId').value;
            const name = document.getElementById('techName').value.trim();
            
            if (!name) {
                alert('请输入技师姓名');
                return;
            }
            
            const techData = {
                avatar: document.getElementById('techAvatar').value,
                name: name,
                level: document.getElementById('techLevel').value,
                rating: parseFloat(document.getElementById('techRating').value) || 5.0,
                tags: [...selectedTags],
                bio: document.getElementById('techBio').value.trim(),
                orders: parseInt(document.getElementById('techOrders').value) || 0,
                reviews: parseInt(document.getElementById('techReviews').value) || 0,
                status: document.getElementById('techStatus').value
            };
            
            showLoading(true);
            try {
                if (id) {
                    // Edit existing - preserve todayOrders and monthlyRevenue
                    const existingTech = technicians.find(t => t.id === id);
                    if (existingTech) {
                        techData.todayOrders = existingTech.todayOrders || 0;
                        techData.monthlyRevenue = existingTech.monthlyRevenue || 0;
                    }
                    console.log('Updating technician:', id, techData);
                    await db.collection('technicians').doc(id).update({ data: techData });
                    console.log('Update success');
                } else {
                    // Add new
                    const newTech = {
                        ...techData,
                        todayOrders: 0,
                        monthlyRevenue: 0,
                        createTime: db.serverDate()
                    };
                    console.log('Adding new technician:', newTech);
                    const addResult = await db.collection('technicians').add({ data: newTech });
                    console.log('Add success:', addResult);
                }
                
                await loadTechnicians();
                closeModal();
            } catch (error) {
                console.error('Save technician error:', error);
                alert('保存失败：' + (error.message || '请重试'));
            } finally {
                showLoading(false);
            }
        }
        
        // Edit technician
        function editTech(id) {
            openModal(id);
        }
        
        // Toggle status
        async function toggleStatus(id) {
            const tech = technicians.find(t => t.id === id);
            if (!tech) return;
            
            showLoading(true);
            try {
                const newStatus = tech.status === 'active' ? 'inactive' : 'active';
                await db.collection('technicians').doc(id).update({
                    data: { status: newStatus }
                });
                await loadTechnicians();
            } catch (error) {
                console.error('Toggle status error:', error);
                alert('操作失败，请重试');
            } finally {
                showLoading(false);
            }
        }
        
        // Delete modal
        function openDeleteModal(id) {
            const tech = technicians.find(t => t.id === id);
            if (tech) {
                deleteTargetId = id;
                document.getElementById('deleteTechName').textContent = tech.name;
                document.getElementById('deleteModal').classList.add('show');
            }
        }
        
        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
            deleteTargetId = null;
        }
        
        async function confirmDelete() {
            if (!deleteTargetId) return;
            
            showLoading(true);
            try {
                await db.collection('technicians').doc(deleteTargetId).remove();
                await loadTechnicians();
                closeDeleteModal();
            } catch (error) {
                console.error('Delete technician error:', error);
                alert('删除失败，请重试');
            } finally {
                showLoading(false);
            }
        }
        
        // Close modal on outside click
        document.getElementById('techModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        document.getElementById('deleteModal').addEventListener('click', function(e) {
            if (e.target === this) closeDeleteModal();
        });
        
        // Initialize
        initCloudbase();
    </script>
</body>
</html>
