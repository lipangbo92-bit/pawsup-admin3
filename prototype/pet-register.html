<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>添加宠物 - 爪哇宠屋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#F97316',
                        'primary-light': '#FFF7ED',
                        'primary-dark': '#EA580C',
                    },
                    fontFamily: {
                        sans: ['Noto Sans SC', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto h-screen bg-gray-50 shadow-2xl flex flex-col relative">
        
        <!-- 顶部导航栏 -->
        <div class="bg-gradient-to-r from-orange-500 to-orange-600 flex-shrink-0">
            <div class="px-4 pt-12 pb-4 flex items-center justify-center relative">
                <button onclick="goToIndex()" class="absolute left-4 text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 class="text-lg font-semibold text-white">添加宠物</h1>
            </div>
        </div>
        
        <!-- 表单区域 - 可滚动 -->
        <div class="flex-1 overflow-y-auto p-4">
            <!-- 宠物昵称 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">宠物昵称 <span class="text-red-500">*</span></label>
                <input type="text" id="petName" placeholder="请输入宠物昵称，如：旺财" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-orange-100">
            </div>
            
            <!-- 物种选择 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">物种 <span class="text-red-500">*</span></label>
                <div class="flex gap-3">
                    <button class="flex-1 bg-primary text-white py-3 rounded-xl text-sm font-medium border-2 border-primary">🐕 狗狗</button>
                    <button class="flex-1 bg-white text-gray-600 py-3 rounded-xl text-sm font-medium border-2 border-gray-200">🐈 猫咪</button>
                    <button class="flex-1 bg-white text-gray-600 py-3 rounded-xl text-sm font-medium border-2 border-gray-200">🐾 其他</button>
                </div>
            </div>
            
            <!-- 品种 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">品种</label>
                <input type="text" id="breed" placeholder="如：金毛、英短、柯基等" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-orange-100">
            </div>
            
            <!-- 性别 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">性别</label>
                <div class="flex gap-3">
                    <button class="flex-1 bg-primary text-white py-3 rounded-xl text-sm font-medium border-2 border-primary">♂ 公</button>
                    <button class="flex-1 bg-white text-gray-600 py-3 rounded-xl text-sm font-medium border-2 border-gray-200">♀ 母</button>
                    <button class="flex-1 bg-white text-gray-600 py-3 rounded-xl text-sm font-medium border-2 border-gray-200">⚥ 未知</button>
                </div>
            </div>
            
            <!-- 年龄 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">年龄</label>
                <div class="flex items-center bg-white border border-gray-200 rounded-xl overflow-hidden">
                    <input type="number" id="age" placeholder="0" min="0" class="flex-1 px-4 py-3 text-sm text-center focus:outline-none">
                    <span class="px-4 py-3 text-sm text-gray-500 border-l border-gray-200">岁</span>
                </div>
            </div>
            
            <!-- 体重 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">体重</label>
                <div class="flex items-center bg-white border border-gray-200 rounded-xl overflow-hidden">
                    <input type="number" id="weight" placeholder="0" min="0" step="0.1" class="flex-1 px-4 py-3 text-sm text-center focus:outline-none">
                    <span class="px-4 py-3 text-sm text-gray-500 border-l border-gray-200">kg</span>
                </div>
            </div>
            
            <!-- 备注 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">备注</label>
                <textarea id="remark" placeholder="性格、注意事项、特殊需求等（选填）" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-orange-100 resize-none" rows="3"></textarea>
            </div>
        </div>
        
        <!-- 底部按钮区域 -->
        <div class="flex-shrink-0 px-6 py-4 bg-white border-t border-gray-100">
            <div class="flex gap-3">
                <button onclick="goToIndex()" class="flex-1 bg-white text-primary border-2 border-primary py-3 rounded-full text-base font-semibold active:scale-95 transition-transform">
                    跳过
                </button>
                <button onclick="saveAndContinue()" class="flex-[2] bg-primary text-white py-3 rounded-full text-base font-semibold shadow-lg active:scale-95 transition-transform">
                    保存并继续
                </button>
            </div>
        </div>
        
        <!-- 底部导航栏 - 固定在底部 -->
        <div class="flex-shrink-0 bg-white border-t border-gray-100 z-50">
            <div class="flex items-center justify-around py-2">
                <a href="index-new.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h3m6-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    <span class="text-[10px] mt-0.5 font-medium">首页</span>
                </a>
                <a href="services.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">服务</span>
                </a>
                <a href="orders.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">订单</span>
                </a>
                <a href="profile.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">我的</span>
                </a>
            </div>
        </div>
    </div>
    
    <script>
        function selectSpecies(el) {
            document.querySelectorAll('.species-tag').forEach(tag => tag.classList.remove('active'));
            el.classList.add('active');
        }
        
        function selectGender(el) {
            document.querySelectorAll('.gender-tag').forEach(tag => tag.classList.remove('active'));
            el.classList.add('active');
        }
        
        function saveAndContinue() {
            const petName = document.getElementById('petName').value.trim();
            if (!petName) {
                alert('请输入宠物昵称');
                return;
            }
            const petData = {
                name: petName,
                species: 'dog',
                breed: document.getElementById('breed').value.trim(),
                gender: 'male',
                age: document.getElementById('age').value,
                weight: document.getElementById('weight').value,
                remark: document.getElementById('remark').value.trim()
            };
            localStorage.setItem('petRegisterData', JSON.stringify(petData));
            localStorage.setItem('hasRegisteredPet', 'true');
            window.location.href = 'index.html';
        }
        
        function goToIndex() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
