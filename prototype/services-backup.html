<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>服务项目 - 爪哇宠屋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#F97316',
                        'primary-light': '#FFF7ED',
                        'primary-dark': '#EA580C',
                    },
                    fontFamily: {
                        sans: ['Noto Sans SC', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto min-h-screen bg-gray-50 shadow-2xl overflow-hidden">
        
        <!-- 顶部导航栏 -->
        <div class="bg-gradient-to-r from-orange-500 to-orange-600">
            <div class="px-4 pt-12 pb-4 flex items-center justify-center relative">
                <button onclick="window.history.back()" class="absolute left-4 text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </a>
                <h1 class="text-lg font-semibold text-white">服务项目</h1>
            </div>
        </div>
        
        <!-- 左右分栏布局 -->
        <div class="flex min-h-[calc(100vh-180px)]">
            <!-- 左侧分类导航 -->
            <div class="w-20 bg-white flex-shrink-0 py-3 shadow-sm">
                <div class="px-2 py-3 text-center text-sm font-medium text-primary bg-orange-50 border-l-3 border-primary">
                    推荐
                </div>
                <div class="px-2 py-3 text-center text-sm text-gray-500">基础护理</div>
                <div class="px-2 py-3 text-center text-sm text-gray-500">美容</div>
                <div class="px-2 py-3 text-center text-sm text-gray-500">SPA</div>
                <div class="px-2 py-3 text-center text-sm text-gray-500">寄养</div>
                <div class="px-2 py-3 text-center text-sm text-gray-500">医疗</div>
                <div class="px-2 py-3 text-center text-sm text-gray-500">周边</div>
            </div>
            
            <!-- 右侧服务列表 -->
            <div class="flex-1 bg-gray-50 p-3 pb-24 overflow-y-auto">
                <!-- 服务卡片1 -->
                <div class="bg-white rounded-xl p-3 flex gap-3 mb-3 shadow-sm">
                    <div class="w-20 h-20 bg-gradient-to-br from-orange-100 to-orange-200 rounded-xl flex items-center justify-center flex-shrink-0">
                        <svg class="w-10 h-10 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <h4 class="text-sm font-semibold text-gray-800">狗狗基础洗护</h4>
                            <p class="text-xs text-gray-500 mt-1">洗澡、吹干、基础清理，约60分钟</p>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-lg font-bold text-primary">¥99<span class="text-xs font-normal text-gray-400">起</span></span>
                            <a href="booking-time.html?service=dog-bath" class="w-7 h-7 bg-primary rounded-full flex items-center justify-center text-white">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>
                
                <!-- 服务卡片2 -->
                <div class="bg-white rounded-xl p-3 flex gap-3 mb-3 shadow-sm">
                    <div class="w-20 h-20 bg-gradient-to-br from-pink-100 to-pink-200 rounded-xl flex items-center justify-center flex-shrink-0">
                        <svg class="w-10 h-10 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                        </svg>
                    </div>
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <h4 class="text-sm font-semibold text-gray-800">猫咪轻柔洗护</h4>
                            <p class="text-xs text-gray-500 mt-1">轻柔沐浴、精细护理，约90分钟</p>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-lg font-bold text-primary">¥129<span class="text-xs font-normal text-gray-400">起</span></span>
                            <a href="booking-time.html?service=cat-bath" class="w-7 h-7 bg-primary rounded-full flex items-center justify-center text-white">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>
                
                <!-- 服务卡片3 -->
                <div class="bg-white rounded-xl p-3 flex gap-3 mb-3 shadow-sm">
                    <div class="w-20 h-20 bg-gradient-to-br from-purple-100 to-purple-200 rounded-xl flex items-center justify-center flex-shrink-0">
                        <svg class="w-10 h-10 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.121 14.121L19 19m-7-7l7-7m-7 7l-2.879 2.879M12 12L9.121 9.121m0 5.758a3 3 0 10-4.243 4.243 3 3 0 004.243-4.243zm0-5.758a3 3 0 10-4.243-4.243 3 3 0 004.243 4.243z"/>
                        </svg>
                    </div>
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <h4 class="text-sm font-semibold text-gray-800">美容造型</h4>
                            <p class="text-xs text-gray-500 mt-1">专业造型、精细修剪，约120分钟</p>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-lg font-bold text-primary">¥199<span class="text-xs font-normal text-gray-400">起</span></span>
                            <a href="booking-time.html?service=beauty" class="w-7 h-7 bg-primary rounded-full flex items-center justify-center text-white">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>
                
                <!-- 服务卡片4 -->
                <div class="bg-white rounded-xl p-3 flex gap-3 mb-3 shadow-sm">
                    <div class="w-20 h-20 bg-gradient-to-br from-blue-100 to-blue-200 rounded-xl flex items-center justify-center flex-shrink-0">
                        <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                        </svg>
                    </div>
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <h4 class="text-sm font-semibold text-gray-800">宠物寄养</h4>
                            <p class="text-xs text-gray-500 mt-1">舒适笼位、每日运动、专业陪玩</p>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-lg font-bold text-primary">¥80<span class="text-xs font-normal text-gray-400">/晚</span></span>
                            <a href="booking-time.html?service=boarding" class="w-7 h-7 bg-primary rounded-full flex items-center justify-center text-white">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>
                
                <!-- 服务卡片5 -->
                <div class="bg-white rounded-xl p-3 flex gap-3 shadow-sm">
                    <div class="w-20 h-20 bg-gradient-to-br from-green-100 to-green-200 rounded-xl flex items-center justify-center flex-shrink-0">
                        <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <h4 class="text-sm font-semibold text-gray-800">上门接送</h4>
                            <p class="text-xs text-gray-500 mt-1">专车接送、安全保障、方便快捷</p>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-lg font-bold text-primary">¥30<span class="text-xs font-normal text-gray-400">/次</span></span>
                            <a href="booking-time.html?service=pickup" class="w-7 h-7 bg-primary rounded-full flex items-center justify-center text-white">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 底部导航栏 -->
        <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 z-50">
            <div class="flex items-center justify-around py-2">
                <a href="index-new.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">首页</span>
                </a>
                <div class="flex flex-col items-center py-1 text-primary">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    <span class="text-[10px] mt-0.5 font-medium">服务</span>
                </div>
                <a href="orders.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">订单</span>
                </a>
                <a href="profile.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">我的</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
