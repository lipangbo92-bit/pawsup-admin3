<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>选择宠物 - 爪哇宠屋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#F97316',
                        'primary-light': '#FFF7ED',
                        'primary-dark': '#EA580C',
                    },
                    fontFamily: {
                        sans: ['Noto Sans SC', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto min-h-screen bg-gray-50 shadow-2xl overflow-hidden">
        
        <!-- 顶部导航栏 -->
        <div class="bg-gradient-to-r from-orange-500 to-orange-600">
            <div class="px-4 pt-12 pb-4 flex items-center justify-center relative">
                <button onclick="window.history.back()" class="absolute left-4 text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 class="text-lg font-semibold text-white">选择宠物</h1>
            </div>
        </div>
        
        <!-- 宠物列表 -->
        <div class="p-4 pb-32">
            <!-- 宠物卡片1 -->
            <div class="bg-white rounded-2xl p-4 flex items-center gap-4 mb-4 border-2 border-primary shadow-sm">
                <div class="w-16 h-16 bg-gradient-to-br from-orange-200 to-orange-300 rounded-full flex items-center justify-center">
                    <svg class="w-8 h-8 text-orange-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                    </svg>
                </div>
                <div class="flex-1">
                    <h3 class="text-base font-semibold text-gray-800">豆豆</h3>
                    <p class="text-sm text-gray-500 mt-1">金毛 · 2岁 · 30kg</p>
                </div>
                <div class="w-6 h-6 bg-primary rounded-full flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
            </div>
            
            <!-- 宠物卡片2 -->
            <div class="bg-white rounded-2xl p-4 flex items-center gap-4 border-2 border-transparent shadow-sm">
                <div class="w-16 h-16 bg-gradient-to-br from-pink-200 to-pink-300 rounded-full flex items-center justify-center">
                    <svg class="w-8 h-8 text-pink-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                    </svg>
                </div>
                <div class="flex-1">
                    <h3 class="text-base font-semibold text-gray-800">咪咪</h3>
                    <p class="text-sm text-gray-500 mt-1">英短 · 1岁 · 4kg</p>
                </div>
                <div class="w-6 h-6 border-2 border-gray-200 rounded-full"></div>
            </div>
            
            <!-- 添加新宠物 -->
            <div onclick="window.location.href='pet-info.html'" class="bg-white rounded-2xl p-6 mt-4 border-2 border-dashed border-orange-200 flex flex-col items-center justify-center cursor-pointer active:scale-95 transition-transform">
                <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center mb-2">
                    <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                </div>
                <span class="text-primary font-medium">添加新宠物</span>
            </div>
        </div>
        
        <!-- 底部按钮 -->
        <div class="fixed bottom-20 left-1/2 -translate-x-1/2 w-full max-w-md px-6">
            <button onclick="window.location.href='booking-time.html'" class="w-full bg-primary text-white py-4 rounded-full text-base font-semibold shadow-lg active:scale-95 transition-transform">
                下一步
            </button>
        </div>
        
        <!-- 底部导航栏 -->
        <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 z-50">
            <div class="flex items-center justify-around py-2">
                <a href="index-new.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">首页</span>
                </a>
                <a href="services.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">服务</span>
                </a>
                <a href="orders.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">订单</span>
                </a>
                <a href="profile.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">我的</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
