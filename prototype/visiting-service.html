<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上门喂养预约 - 栖游记宠物店</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#F97316',
                        'primary-light': '#FB923C',
                        'primary-dark': '#EA580C',
                    },
                    fontFamily: {
                        sans: ['Noto Sans SC', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .date-card {
            transition: all 0.2s ease;
        }
        .date-card.active {
            background: linear-gradient(135deg, #FFF7ED 0%, #FFEDD5 100%);
            border-color: #F97316;
        }
        .date-card:active {
            transform: scale(0.95);
        }
        .time-slot {
            transition: all 0.2s;
        }
        .time-slot.selected {
            background: linear-gradient(135deg, #F97316 0%, #EA580C 100%);
            color: white;
            border-color: transparent;
        }
        .tech-card {
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .tech-card.selected {
            border-color: #F97316;
            background: linear-gradient(135deg, #FFF7ED 0%, #FFEDD5 100%);
        }
        input[type="date"] {
            appearance: none;
            -webkit-appearance: none;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto min-h-screen bg-gray-50 shadow-2xl overflow-hidden pb-40">
        
        <!-- 顶部导航栏 -->
        <div class="bg-gradient-to-r from-primary to-primary-dark">
            <div class="px-4 pt-12 pb-4 flex items-center justify-center relative">
                <button onclick="window.history.back()" class="absolute left-4 text-white hover:opacity-80 transition-opacity">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 class="text-lg font-semibold text-white">上门喂养预约</h1>
            </div>
        </div>

        <!-- 主体内容 -->
        <div class="p-4 space-y-4">
            
            <!-- 服务地址 -->
            <div class="bg-white rounded-2xl p-5 card-shadow">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
                            <svg class="w-4 h-4 text-primary" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                        <span class="text-base font-semibold text-gray-800">服务地址</span>
                    </div>
                    <button class="text-sm text-primary font-medium hover:opacity-80">更换地址</button>
                </div>
                
                <div class="bg-gradient-to-r from-gray-50 to-gray-100 rounded-xl p-4">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-primary-dark flex items-center justify-center flex-shrink-0 shadow-md">
                            <span class="text-white text-sm font-bold">家</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-sm font-semibold text-gray-800">李奥</span>
                                <span class="text-sm text-gray-500">138****8888</span>
                            </div>
                            <p class="text-xs text-gray-500 leading-relaxed">上海市浦东新区陆家嘴环路1000号恒生银行大厦25楼</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 选择时间 -->
            <div class="bg-white rounded-2xl p-5 card-shadow">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
                        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                    </div>
                    <span class="text-base font-semibold text-gray-800">上门时间</span>
                </div>

                <!-- 日期选择 -->
                <div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide mb-4">
                    <div class="date-card active flex-shrink-0 w-[72px] h-[88px] rounded-2xl border-2 border-primary bg-gradient-to-b from-orange-50 to-orange-100 flex flex-col items-center justify-center cursor-pointer">
                        <span class="text-xs text-primary font-medium mb-1">今天</span>
                        <span class="text-xl font-bold text-primary">3/3</span>
                        <span class="text-xs text-primary/70 mt-1">可约</span>
                    </div>
                    <div class="date-card flex-shrink-0 w-[72px] h-[88px] rounded-2xl border border-gray-200 bg-white flex flex-col items-center justify-center cursor-pointer">
                        <span class="text-xs text-gray-500 mb-1">周二</span>
                        <span class="text-xl font-bold text-gray-700">3/4</span>
                        <span class="text-xs text-green-500 mt-1">可约</span>
                    </div>
                    <div class="date-card flex-shrink-0 w-[72px] h-[88px] rounded-2xl border border-gray-200 bg-white flex flex-col items-center justify-center cursor-pointer">
                        <span class="text-xs text-gray-500 mb-1">周三</span>
                        <span class="text-xl font-bold text-gray-700">3/5</span>
                        <span class="text-xs text-green-500 mt-1">可约</span>
                    </div>
                    <div class="date-card flex-shrink-0 w-[72px] h-[88px] rounded-2xl border border-gray-200 bg-white flex flex-col items-center justify-center cursor-pointer">
                        <span class="text-xs text-gray-500 mb-1">周四</span>
                        <span class="text-xl font-bold text-gray-700">3/6</span>
                        <span class="text-xs text-green-500 mt-1">可约</span>
                    </div>
                    <div class="date-card flex-shrink-0 w-[72px] h-[88px] rounded-2xl border border-gray-200 bg-white flex flex-col items-center justify-center cursor-pointer">
                        <span class="text-xs text-gray-500 mb-1">周五</span>
                        <span class="text-xl font-bold text-gray-700">3/7</span>
                        <span class="text-xs text-orange-500 mt-1">紧张</span>
                    </div>
                </div>

                <!-- 时间段 -->
                <div class="grid grid-cols-4 gap-3">
                    <button class="time-slot selected py-3 rounded-xl text-sm font-medium shadow-md shadow-orange-200">09:00</button>
                    <button class="time-slot py-3 rounded-xl border border-gray-200 text-gray-700 text-sm font-medium bg-white hover:border-primary hover:text-primary">10:00</button>
                    <button class="time-slot py-3 rounded-xl border border-gray-200 text-gray-700 text-sm font-medium bg-white hover:border-primary hover:text-primary">11:00</button>
                    <button class="time-slot py-3 rounded-xl border border-gray-200 text-gray-700 text-sm font-medium bg-white hover:border-primary hover:text-primary">14:00</button>
                    <button class="time-slot py-3 rounded-xl border border-gray-200 text-gray-700 text-sm font-medium bg-white hover:border-primary hover:text-primary">15:00</button>
                    <button class="time-slot py-3 rounded-xl border border-gray-200 text-gray-700 text-sm font-medium bg-white hover:border-primary hover:text-primary">16:00</button>
                    <button class="time-slot py-3 rounded-xl bg-gray-100 text-gray-400 text-sm font-medium cursor-not-allowed">17:00</button>
                    <button class="time-slot py-3 rounded-xl border border-gray-200 text-gray-700 text-sm font-medium bg-white hover:border-primary hover:text-primary">18:00</button>
                </div>
            </div>

            <!-- 选择技师 -->
            <div class="bg-white rounded-2xl p-5 card-shadow">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
                            <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </div>
                        <span class="text-base font-semibold text-gray-800">选择技师</span>
                    </div>
                    <span class="text-xs bg-primary/10 text-primary px-2 py-1 rounded-full">推荐</span>
                </div>

                <!-- 技师列表 -->
                <div class="space-y-3">
                    <div class="tech-card selected flex items-center gap-4 p-4 rounded-xl bg-gradient-to-r from-orange-50 to-orange-100/50 cursor-pointer">
                        <div class="relative">
                            <div class="w-14 h-14 rounded-full bg-gradient-to-br from-orange-200 to-orange-300 flex items-center justify-center text-2xl">
                                👩
                            </div>
                            <div class="absolute -bottom-0.5 -right-0.5 w-4 h-4 bg-green-500 rounded-full border-2 border-white"></div>
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-semibold text-gray-800">王小花</span>
                                <span class="px-1.5 py-0.5 bg-primary text-white text-xs rounded-full">推荐</span>
                            </div>
                            <div class="flex items-center gap-3 mt-1.5">
                                <span class="text-xs text-gray-500 flex items-center gap-0.5">
                                    <span class="text-yellow-400">★</span> 4.9
                                </span>
                                <span class="text-xs text-gray-500">服务 328 次</span>
                            </div>
                        </div>
                        <div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center">
                            <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                    </div>

                    <div class="tech-card flex items-center gap-4 p-4 rounded-xl bg-gray-50 cursor-pointer hover:bg-gray-100">
                        <div class="relative">
                            <div class="w-14 h-14 rounded-full bg-gradient-to-br from-blue-200 to-blue-300 flex items-center justify-center text-2xl">
                                👨
                            </div>
                            <div class="absolute -bottom-0.5 -right-0.5 w-4 h-4 bg-gray-300 rounded-full border-2 border-white"></div>
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-semibold text-gray-800">李小明</span>
                            </div>
                            <div class="flex items-center gap-3 mt-1.5">
                                <span class="text-xs text-gray-500 flex items-center gap-0.5">
                                    <span class="text-yellow-400">★</span> 4.8
                                </span>
                                <span class="text-xs text-gray-500">服务 156 次</span>
                            </div>
                        </div>
                        <div class="w-6 h-6 rounded-full border-2 border-gray-300"></div>
                    </div>
                </div>
            </div>

            <!-- 服务项目 -->
            <div class="bg-white rounded-2xl p-5 card-shadow">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
                        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                        </svg>
                    </div>
                    <span class="text-base font-semibold text-gray-800">服务项目</span>
                </div>

                <div class="flex items-center justify-between p-4 bg-gradient-to-r from-orange-50 to-yellow-50 rounded-xl border border-orange-100">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-xl bg-white flex items-center justify-center shadow-sm text-2xl">
                            🐱
                        </div>
                        <div>
                            <p class="text-sm font-semibold text-gray-800">猫咪上门喂养</p>
                            <p class="text-xs text-gray-500 mt-0.5">喂食、铲屎、陪玩</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-xl font-bold text-primary">¥88</span>
                        <span class="text-xs text-gray-400">/次</span>
                    </div>
                </div>
            </div>

            <!-- 宠物信息 -->
            <div class="bg-white rounded-2xl p-5 card-shadow">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
                            <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <span class="text-base font-semibold text-gray-800">宠物信息</span>
                    </div>
                    <button class="text-sm text-primary font-medium hover:opacity-80">+ 添加宠物</button>
                </div>

                <div class="p-4 bg-gradient-to-r from-gray-50 to-gray-100 rounded-xl">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-orange-200 to-orange-300 flex items-center justify-center text-2xl">
                            🐱
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-semibold text-gray-800">咪咪</span>
                                <span class="px-1.5 py-0.5 bg-pink-100 text-pink-600 text-xs rounded-full">妹妹</span>
                                <span class="text-xs text-gray-500">2岁 · 英短</span>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">已绝育 · 疫苗齐全</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 服务需求 -->
            <div class="bg-white rounded-2xl p-5 card-shadow">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
                        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                        </svg>
                    </div>
                    <span class="text-base font-semibold text-gray-800">服务需求</span>
                </div>
                
                <!-- 快捷标签 -->
                <div class="flex flex-wrap gap-2 mb-3">
                    <span class="px-3 py-1.5 bg-orange-50 text-primary text-xs rounded-full border border-orange-100 cursor-pointer">需要换水</span>
                    <span class="px-3 py-1.5 bg-gray-100 text-gray-600 text-xs rounded-full cursor-pointer">加粮</span>
                    <span class="px-3 py-1.5 bg-gray-100 text-gray-600 text-xs rounded-full cursor-pointer">铲屎</span>
                    <span class="px-3 py-1.5 bg-gray-100 text-gray-600 text-xs rounded-full cursor-pointer">陪玩10分钟</span>
                    <span class="px-3 py-1.5 bg-gray-100 text-gray-600 text-xs rounded-full cursor-pointer">清理猫砂盆</span>
                </div>
                
                <textarea placeholder="请输入其他特殊需求、门禁密码、注意事项等..." 
                    class="w-full h-24 p-4 bg-gray-50 rounded-xl text-sm text-gray-700 placeholder-gray-400 resize-none focus:outline-none focus:ring-2 focus:ring-primary/20 border border-transparent focus:border-primary/30"></textarea>
            </div>

        </div>

        <!-- 底部结算栏 - 在Tabbar上方 -->
        <div class="fixed bottom-[72px] left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 p-4 z-40">
            <div class="flex items-center justify-between">
                <div>
                    <span class="text-xs text-gray-500">合计</span>
                    <div class="flex items-baseline gap-1">
                        <span class="text-2xl font-bold text-primary">¥88</span>
                        <span class="text-xs text-gray-400">约30分钟</span>
                    </div>
                </div>
                <button class="px-8 py-3.5 bg-gradient-to-r from-primary to-primary-dark text-white text-sm font-semibold rounded-full shadow-lg shadow-orange-200 active:scale-95 transition-transform hover:shadow-xl">
                    立即预约
                </button>
            </div>
        </div>

        <!-- 底部Tab导航栏 -->
        <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 z-50">
            <div class="flex items-center justify-around py-2">
                <a href="qiyouji-pet-home.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary transition-colors">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h3m6-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    <span class="text-[10px] mt-0.5 font-medium">首页</span>
                </a>
                <a href="qiyouji-pet-services.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">服务</span>
                </a>
                <a href="qiyouji-pet-orders.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">订单</span>
                </a>
                <a href="qiyouji-pet-profile.html" class="flex flex-col items-center py-1 text-gray-400 hover:text-primary transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span class="text-[10px] mt-0.5">我的</span>
                </a>
            </div>
        </div>

    </div>
</body>
</html>
